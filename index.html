function getWeather() {
  if(gulls.length>200) return '🦅 GULL FORCE WINDS';
  if(gulls.length>100) return '🐦 GULL ALERT';
  if(gulls.length>40)  return '🌤️ PARTLY CLOUDY';
  return '☀️ SUNNY';
}
function getTickerPool() {
  const n=gulls.length;
  if(n>200) return TICKER_POOL.apocalypse;
  if(n>100) return TICKER_POOL.emergency;
  if(n>50)  return TICKER_POOL.breaking;
  if(n>20)  return TICKER_POOL.alert;
  return TICKER_POOL.calm;
}

function drawNewsTicker() {
  const tickerH=18, tickerY=H-tickerH;  // follows bottom of canvas
  // Background bar
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,tickerY,W,tickerH);
  // Left label
  ctx.fillStyle='#e74c3c'; ctx.fillRect(0,tickerY,58,tickerH);
  ctx.fillStyle='#fff'; ctx.font='700 10px Nunito'; ctx.textAlign='center';
  ctx.fillText('LIVE NEWS',29,tickerY+12);
  // Weather right
  const wx=W-90;
  ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(wx,tickerY,90,tickerH);
  ctx.fillStyle='#ffeaa7'; ctx.font='700 9px Nunito'; ctx.textAlign='center';
  ctx.fillText(getWeather(),wx+45,tickerY+12);

  // Pick/rotate headline
  newsMsgTimer--;
  if(newsMsgTimer<=0 || newsMsg===''){
    const pool=getTickerPool();
    newsMsg=pool[Math.floor(Math.random()*pool.length)]+'    ';
    newsScrollX=W; newsMsgTimer=600;
  }
  // Scroll it
  newsScrollX-=1.4;
  ctx.save();
  ctx.beginPath(); ctx.rect(60,tickerY,wx-62,tickerH); ctx.clip();
  ctx.fillStyle = gulls.length>100 ? '#ff6b6b' : gulls.length>50 ? '#ffeaa7' : '#fff';
  ctx.font='700 10px Nunito'; ctx.textAlign='left';
  // Measure text to reset when it scrolls off
  const tw=ctx.measureText(newsMsg).width;
  if(newsScrollX<-tw) newsScrollX=W;
  ctx.fillText(newsMsg,newsScrollX,tickerY+12);
  ctx.restore();
}

// ── MENU BIRDS ─────────────────────────────────────────────
const menuBirds=Array.from({length:22},()=>({
  x:rnd(0,W), y:rnd(0,H),
  vx:rnd(0.4,1.2)*(Math.random()<0.5?1:-1), vy:rnd(-0.6,0.6),
  sz:rnd(6,11), wp:rnd(0,Math.PI*2),
}));

function drawMenuBirds(){
  for(const b of menuBirds){
    b.x+=b.vx; b.y+=b.vy; b.wp+=0.15;
    if(b.x>W+30)b.x=-30; if(b.x<-30)b.x=W+30;
    if(b.y>H+30)b.y=-30; if(b.y<-30)b.y=H+30;
    const wb=Math.sin(b.wp)*0.28, s=b.sz;
    const ang=Math.atan2(b.vy,b.vx);
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(ang+Math.PI/2);
    ctx.fillStyle='rgba(255,255,255,0.88)';
    ctx.beginPath(); ctx.ellipse(0,0,s*0.37,s*0.72,0,0,Math.PI*2); ctx.fill();
    const lw=s*(1.1+wb);
    ctx.beginPath(); ctx.moveTo(-s*0.22,-s*0.1); ctx.quadraticCurveTo(-lw,-s*0.42,-lw*0.65,s*0.5); ctx.lineTo(-s*0.22,s*0.28); ctx.closePath(); ctx.fill();
    const rw=s*(1.1-wb);
    ctx.beginPath(); ctx.moveTo(s*0.22,-s*0.1); ctx.quadraticCurveTo(rw,-s*0.42,rw*0.65,s*0.5); ctx.lineTo(s*0.22,s*0.28); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}
function drawMenuCloud(cx,cy,sc){
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sc,sc);
  ctx.fillStyle='rgba(255,255,255,0.88)';
  [[0,0,26],[30,-10,20],[60,4,23],[20,10,18],[48,12,17]].forEach(([x,y,r])=>{
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

// ── AUDIO ──────────────────────────────────────────────────
// All sounds synthesized via Web Audio — no external files needed.
let _ac=null;
function ac(){
  if(!_ac){try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  return _ac;
}
// Resume on any click (browser autoplay policy)
canvas.addEventListener('click',()=>{const a=ac();if(a&&a.state==='suspended')a.resume();});

// Rate-limit counters (frames)
let squawkCooldown=0, deathCooldown=0, radioSound=0;

// Helicopter persistent engine nodes
let heliEngineGain=null, heliEngineOsc=null, heliEngineOsc2=null;

function playSquawk(){
  const a=ac(); if(!a||squawkCooldown>0) return;
  squawkCooldown = gulls.length>200?18 : gulls.length>80?10 : gulls.length>30?6 : 3;
  const now=a.currentTime, vol=Math.max(0.07, 0.28-gulls.length*0.0005);
  // Sawtooth with rising-then-falling pitch — the scream synth WAS the seagull all along
  const osc=a.createOscillator(), g=a.createGain();
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(580+Math.random()*160, now);
  osc.frequency.setValueAtTime(820+Math.random()*180, now+0.05);
  osc.frequency.linearRampToValueAtTime(460+Math.random()*120, now+0.22);
  g.gain.setValueAtTime(vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
  osc.connect(g); g.connect(a.destination); osc.start(now); osc.stop(now+0.25);
}

function playDeathSquawk(){
  const a=ac(); if(!a||deathCooldown>0) return;
  deathCooldown=10;
  const now=a.currentTime;
  const osc=a.createOscillator(), g=a.createGain();
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(760,now);
  osc.frequency.setValueAtTime(400,now+0.04);
  osc.frequency.linearRampToValueAtTime(160,now+0.14);
  g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.16);
  osc.connect(g); g.connect(a.destination); osc.start(now); osc.stop(now+0.16);
}

function playChipEarned(){
  const a=ac(); if(!a) return;
  const now=a.currentTime;
  // 8-bit ascending arpeggio — square wave, snappy
  [330,440,660].forEach((freq,i)=>{
    const g=a.createGain(), osc=a.createOscillator();
    osc.type='square'; osc.frequency.value=freq;
    osc.connect(g); g.connect(a.destination);
    const t=now+i*0.055;
    g.gain.setValueAtTime(0.12,t); g.gain.setValueAtTime(0.06,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    osc.start(t); osc.stop(t+0.1);
  });
}

function playCarCrash(){
  const a=ac(); if(!a) return;
  const now=a.currentTime;
  // Punchy low thud with bit-crushed noise
  const osc=a.createOscillator(), g=a.createGain();
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(180,now); osc.frequency.setValueAtTime(60,now+0.02);
  osc.frequency.linearRampToValueAtTime(28,now+0.28);
  g.gain.setValueAtTime(0.7,now); g.gain.setValueAtTime(0.5,now+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
  osc.connect(g); g.connect(a.destination); osc.start(now); osc.stop(now+0.35);
  _noiseShot(a,now,0.18,'lowpass',600,0.55);
}

function playBoatSink(){
  const a=ac(); if(!a) return;
  const now=a.currentTime;
  // Resonant noise blups — high Q lowpass on a noise burst = "blup" character
  for(let i=0;i<4;i++){
    const t=now+i*0.16;
    const bufSize=Math.ceil(a.sampleRate*0.06);
    const buf=a.createBuffer(1,bufSize,a.sampleRate);
    const data=buf.getChannelData(0);
    for(let j=0;j<bufSize;j++) data[j]=(Math.random()*2-1)*Math.max(0,1-j/(bufSize*0.25));
    const src=a.createBufferSource(); src.buffer=buf;
    const flt=a.createBiquadFilter();
    flt.type='lowpass';
    flt.frequency.value=160-i*18;  // slightly descending pitch
    flt.Q.value=22;  // very resonant = characteristic blup tone
    const gn=a.createGain(); gn.gain.value=0.65;
    src.connect(flt); flt.connect(gn); gn.connect(a.destination);
    src.start(t);
  }
}

  const a=ac(); if(!a) return;

    const t=now+i*0.075;
    g.gain.setValueAtTime(0.14,t); g.gain.setValueAtTime(0.08,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.16);

}

function startHeliEngine(){
  const a=ac(); if(!a) return;
  stopHeliEngine();
  heliEngineGain=a.createGain(); heliEngineGain.gain.value=0;
  heliEngineGain.connect(a.destination);
  // Low chopper rumble
  heliEngineOsc=a.createOscillator();
  heliEngineOsc.type='sawtooth'; heliEngineOsc.frequency.value=18;
  const flt=a.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=220;
  heliEngineOsc.connect(flt); flt.connect(heliEngineGain);
  // Rhythmic blade whomp
  heliEngineOsc2=a.createOscillator();
  heliEngineOsc2.type='square'; heliEngineOsc2.frequency.value=9;
  const g2=a.createGain(); g2.gain.value=0.35;
  heliEngineOsc2.connect(g2); g2.connect(heliEngineGain);
  heliEngineOsc.start(); heliEngineOsc2.start();
  heliEngineGain.gain.linearRampToValueAtTime(0.22, a.currentTime+1.5);
}

function stopHeliEngine(){
  if(!heliEngineGain) return;
  const a=ac(); if(!a) return;
  try{
    heliEngineGain.gain.linearRampToValueAtTime(0,a.currentTime+0.6);
    const g=heliEngineGain, o1=heliEngineOsc, o2=heliEngineOsc2;
    setTimeout(()=>{try{o1.stop();o2.stop();}catch(e){}},700);
  }catch(e){}
  heliEngineGain=null; heliEngineOsc=null; heliEngineOsc2=null;
}

function playHeliCrash(){
  stopHeliEngine();
  const a=ac(); if(!a) return;
  const now=a.currentTime;
  // Descending pitch + low boom
  const osc=a.createOscillator(), g=a.createGain();
  osc.frequency.setValueAtTime(220,now); osc.frequency.linearRampToValueAtTime(28,now+1.1);
  g.gain.setValueAtTime(0.55,now); g.gain.exponentialRampToValueAtTime(0.001,now+1.3);
  osc.connect(g); g.connect(a.destination); osc.start(now); osc.stop(now+1.3);
  // Heavy noise burst
  _noiseShot(a, now, 1.2, 'lowpass', 350, 0.75);
}

// Internal helper — fire a noise burst
function _noiseShot(a, now, dur, filterType, filterFreq, vol){
  const bufSize=Math.ceil(a.sampleRate*dur);
  const buf=a.createBuffer(1,bufSize,a.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i]=(Math.random()*2-1)*Math.max(0,1-i/bufSize);
  const src=a.createBufferSource();
  src.buffer=buf;
  const flt=a.createBiquadFilter(); flt.type=filterType; flt.frequency.value=filterFreq;
  const gn=a.createGain(); gn.gain.value=vol;
  src.connect(flt); flt.connect(gn); gn.connect(a.destination);
  src.start(now);
}

// ── INIT ───────────────────────────────────────────────────
function initGame(){
  const cfg=DIFF[difficulty];
  gulls=[]; npcs=[]; chips=[]; dogs=[]; particles=[];
  cyclists=[]; diners=[]; foodDrops=[];
  cars=[]; police=[]; pickups=[];
  boats=[]; sharks=[];
  helicopter=null; helicopterSpawned=false;
  stopHeliEngine();
  initWorldDamage();
  runBoatsSunk=0; runCarCrashes=0; runPoliceOverwhelmed=0; runNewsVans=0; flockedWiped=false;
  statGullsKilled=0;
  score=0; growthMeter=0; newGullFlash=0;
  chipCharges=CHIP_MAX; chipTimer=CHIP_RECHARGE;
  gameTimer=cfg.secs; npcSpawnTimer=5;
  cyclistSpawnTimer=220; dinerRespawnTimer=60;
  carSpawnTimer=0; policeSpawnTimer=300; pickupSpawnTimer=1200;
  boatSpawnTimer=0; sharkSpawnTimer=0;
  policeRadioActive=false; policeTimerDrain=0;
  scoreMultiplier=1; multiplierTimer=0; goldFlash=0;
  newsScrollX=W; newsMsg=''; newsMsgTimer=0;
  nextTimeMilestone=100; timeBonusFlash=0;
  stage=1; stageTransition=false; stageTransitionFrame=0; stageUnlockBanner=0;
  H=H_BASE; canvas.height=H; resize();

  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(state==='playing'){
      gameTimer--;
      if(gameTimer<=0){
        gameTimer=0; saveBest(); state='gameover'; clearInterval(timerInterval);
      }
    }
  },1000);

  // Spawn starting flock — resting on the beach
  for(let i=0;i<cfg.startGulls;i++){
    const g=new Gull(W/2+rnd(-180,180), H/2+rnd(-100,100));
    g.airborne=false; g.vx=0; g.vy=0;
    gulls.push(g);
  }
  // NPCs will walk in from edges via npcSpawnTimer (no static spawn)
}

// ── INPUT ──────────────────────────────────────────────────
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);

  if(state==='menu'){
    for(const key of ['easy','normal','hard']){
      const b=MENU_BTNS[key];
      if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){difficulty=key; return;}
    }
    const tb=MENU_BTNS.tutorial;
    if(mx>=tb.x&&mx<=tb.x+tb.w&&my>=tb.y&&my<=tb.y+tb.h){state='tutorial'; return;}
    const achb=MENU_BTNS.achievements;
    if(mx>=achb.x&&mx<=achb.x+achb.w&&my>=achb.y&&my<=achb.y+achb.h){state='achievements'; return;}
    const pb=MENU_BTNS.play;
    if(mx>=pb.x&&mx<=pb.x+pb.w&&my>=pb.y&&my<=pb.y+pb.h){state='playing'; initGame();}
    return;
  }
  if(state==='tutorial'||state==='achievements'){
    if(mx>=W/2-80&&mx<=W/2+80&&my>=H_BASE-55&&my<=H_BASE-15){state='menu';}
    return;
  }
  if(state==='playing'){
    if(chipCharges>0){chips.push(new Chip(mx,my)); chipCharges--;}
    return;
  }
  if(state==='gameover'){
    const diffMult2=DIFF[difficulty].scoreMult;
    const rY=diffMult2!==1?270:240;
    const bY=rY+70;
    if(mx>=W/2-188&&mx<=W/2-20&&my>=bY&&my<=bY+48){state='playing'; initGame();}
    if(mx>=W/2+20&&mx<=W/2+188&&my>=bY&&my<=bY+48){
      state='menu'; stopHeliEngine(); H=H_BASE; canvas.height=H; resize();
    }
  }
});

// ── MAIN LOOP ──────────────────────────────────────────────
function loop(){
  // Canvas resize must happen BEFORE clearRect — setting canvas.height mid-frame
  // wipes everything drawn so far, causing the background-vanish bug.
  if(state==='playing' && stageTransition){
    stageTransitionFrame++;
    const t=Math.min(stageTransitionFrame/150,1);
    const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    const targetH=stage<=2?H_STAGE2:stage<=3?H_STAGE3:H_STAGE4;
    const startH =stage<=2?H_BASE  :stage<=3?H_STAGE2:H_STAGE3;
    const newH=Math.round(startH+(targetH-startH)*ease);
    if(newH!==H){H=newH; canvas.height=H; resize();}
    if(stageTransitionFrame>=150) stageTransition=false;
  }

  ctx.clearRect(0,0,W,H);
  frame++;

  if(state==='menu'){
    drawMenu();
  }else if(state==='tutorial'){
    drawTutorial();
  }else if(state==='achievements'){
    drawAchievementScreen();

  }else if(state==='playing'){
    drawBackground();

    chips=chips.filter(c=>c.update());

    if(chipCharges<CHIP_MAX){
      chipTimer--;
      if(chipTimer<=0){ chipCharges++; chipTimer=CHIP_RECHARGE; playChipEarned(); }
    }

    // Chip eating: consumed when 2+ airborne gulls arrive
    for (const chip of chips) {
      if (chip.life <= 20) continue; // already fading, skip
      let near=0;
      for (const g of gulls) {
        if (g.airborne && Math.hypot(g.x-chip.x,g.y-chip.y)<32) near++;
      }
      if (near >= 2) {
        chip.life = 18; // trigger instant fade-out
        // Crumb burst particles
        for (let i=0;i<6;i++) {
          const p=new Particle(chip.x+rnd(-18,18),chip.y+rnd(-12,12),1);
          p.text=['✦','·','~','*'][Math.floor(rnd(0,4))];
          p.col='#fdcb6e'; p.sz=rnd(8,13);
          particles.push(p);
        }
      }
    }

    if(Math.random()<DIFF[difficulty].dogRate) dogs.push(new DogWalker());
    dogs=dogs.filter(d=>{d.update(); return d.alive;});

    for(const g of gulls) g.update();

    // NPCs update — returns false to despawn (fled off-screen or left voluntarily)
    npcs=npcs.filter(n=>n.update()!==false);

    // Keep NPC population topped up — they walk in from edges
    npcSpawnTimer--;
    const npcCap = DIFF[difficulty].npcCount
                 + (stage>=2 ? 6 : 0)
                 + (stage>=3 ? 10 : 0)
                 + (stage>=4 ? 18 : 0);
    if (npcSpawnTimer<=0 && npcs.length<npcCap) {
      spawnNPC();
      npcSpawnTimer = npcs.length < Math.floor(npcCap*0.6) ? 55 : 320;
    }

    // ── Achievement: mega flock ───────────────────────────
    if(gulls.length>=500) unlockAch('mega_flock');

    // ── Flock wiped out: game ends early ─────────────────
    if(gulls.length===0 && gameTimer>0){
      flockedWiped=true;
      gameTimer=0; saveBest(); state='gameover';
      clearInterval(timerInterval);
      unlockAch('last_squawk');
    }

    // ── Score milestone ───────────────────────────────────
    if (score >= nextTimeMilestone) {
      gameTimer = Math.min(gameTimer+DIFF[difficulty].timeBonus, 600);
      nextTimeMilestone = Math.floor(nextTimeMilestone * 2.0);
      timeBonusFlash = 100;
    }

    // ── Stage 2 entities: cyclists, diners, food drops, police ─
    if (stage>=2) {
      cyclistSpawnTimer--;
      if (cyclistSpawnTimer<=0 && H>=H_STAGE2-20) {
        cyclists.push(new Cyclist());
        cyclistSpawnTimer=rnd(280,520)|0;
      }
      dinerRespawnTimer--;
      if (dinerRespawnTimer<=0 && H>=H_STAGE2-20) {
        for (const seat of DINER_SEATS) {
          const occupied=diners.some(d=>Math.hypot(d.x-seat.x,d.y-seat.y)<30);
          if (!occupied && Math.random()<0.5) diners.push(new Diner(seat));
        }
        dinerRespawnTimer=rnd(500,900)|0;
      }
      // Police patrol the promenade (stage 2 hazard)
      policeSpawnTimer--;
      if (policeSpawnTimer<=0 && H>=H_STAGE2-20 && police.length<3) {
        police.push(new Police());
        policeSpawnTimer=rnd(DIFF[difficulty].policeRate, DIFF[difficulty].policeRate*1.8)|0;
      }
      cyclists  =cyclists.filter(c=>{c.update(); return c.alive;});
      diners    =diners.filter(d=>d.update()!==false);
      foodDrops =foodDrops.filter(f=>f.update()!==false);
      police    =police.filter(p=>{p.update(); return p.alive;});
      const radioingCount=police.filter(p=>p.radioing).length;
      policeRadioActive = radioingCount>0;
      if (radioingCount>0) {
        policeTimerDrain += radioingCount/60;
        if (policeTimerDrain>=1) { policeTimerDrain--; gameTimer=Math.max(0,gameTimer-1); }
      }
    }

    // ── Stage 3 entities: cars + golden lure pickup ───────
    if (stage>=3) {
      carSpawnTimer--;
      if (carSpawnTimer<=0 && H>=H_STAGE3-20) {
        cars.push(new Car());
        carSpawnTimer=rnd(DIFF[difficulty].carRate, DIFF[difficulty].carRate*2.1)|0;
      }
      // News van — rare, unpredictable, auto-despawns
      pickupSpawnTimer--;
      if (pickupSpawnTimer<=0 && H>=H_STAGE3-20 && pickups.length===0) {
        pickups.push(new NewsVan());
        pickupSpawnTimer=rnd(2400,5400)|0;
      }
      cars   =cars.filter(c=>{c.update(); return c.alive;});
      pickups=pickups.filter(p=>{p.update(); return p.alive;});
    }

    // ── Stage unlocks ─────────────────────────────────────
    if (stage===1 && gulls.length>=STAGE2_FLOCK) {
      stage=2; stageTransition=true; stageTransitionFrame=0;
      stageUnlockBanner=220; gameTimer+=30;
      cyclistSpawnTimer=300; dinerRespawnTimer=120; policeSpawnTimer=400;
      triggerStage2Damage();
    }
    if (stage===2 && gulls.length>=STAGE3_FLOCK) {
      stage=3; stageTransition=true; stageTransitionFrame=0;
      stageUnlockBanner=220; gameTimer+=30;
      carSpawnTimer=200; pickupSpawnTimer=1200;
      triggerStage3Damage();
    }
    if (stage===3 && gulls.length>=STAGE4_FLOCK) {
      stage=4; stageTransition=true; stageTransitionFrame=0;
      stageUnlockBanner=220; gameTimer+=30;
      boatSpawnTimer=300; sharkSpawnTimer=600;
      triggerStage4Damage();
    }

    // ── Stage 4 entities: boats + sharks ─────────────────
    if (stage>=4) {
      boatSpawnTimer--;
      if (boatSpawnTimer<=0 && H>=H_STAGE4-20) {
        if (boats.length<4) boats.push(new Boat());
        boatSpawnTimer=rnd(600,1100)|0;
      }
      sharkSpawnTimer--;
      if (sharkSpawnTimer<=0 && H>=H_STAGE4-20 && sharks.length<DIFF[difficulty].sharkMax) {
        sharks.push(new Shark());
        sharkSpawnTimer=rnd(400,800)|0;
      }
      boats  =boats.filter(b=>{b.update(); return b.alive;});
      sharks.forEach(s=>s.update());
    }

    // ── Audio cooldown ticks ──────────────────────────────
    if(squawkCooldown>0) squawkCooldown--;
    if(deathCooldown>0)  deathCooldown--;
    if(radioSound>0)     radioSound--;

    // ── Helicopter boss at 300 gulls ─────────────────────
    if (!helicopterSpawned && gulls.length>=HELICOPTER_FLOCK) {
      helicopterSpawned=true;
      helicopter=new Helicopter();
      startHeliEngine();
      const p=new Particle(W/2,H_BASE/2,4);
      p.text='🚁 HELICOPTER INCOMING!'; p.col='#ff4757'; p.sz=20;
      p.vx=0; p.vy=0; p.dec=0.004; particles.push(p);
    }
    if (helicopter) {
      // Speed up engine when tail broken
      if(heliEngineOsc && helicopter.tailBroken)
        heliEngineOsc.frequency.value=26+Math.sin(frame*0.2)*4;
      helicopter.update();
      if (!helicopter.alive) helicopter=null;
    }

    // Police radio crackle
    if(policeRadioActive && Math.random()<0.008) playPoliceRadio();

    // ── Score multiplier countdown ────────────────────────
    if (multiplierTimer>0) {
      multiplierTimer--;
      if (multiplierTimer===0) scoreMultiplier=1;
    }
    if (goldFlash>0) goldFlash-=0.025;

    // ── Grow flock when meter fills ───────────────────────
    if(growthMeter>=CHAOS_PER_GULL){
      growthMeter-=CHAOS_PER_GULL;
      // Always spawn from ocean (top) — keeps attention on beach, avoids road chaos
      const nx=rnd(0,W), ny=-15;
      const g=new Gull(nx,ny);
      g.airborne=true; g.settleTimer=180;
      const dx=W/2-nx, dy=H_BASE/2-ny, dd=Math.hypot(dx,dy)+0.001;
      g.vx=(dx/dd)*g.maxSpd; g.vy=(dy/dd)*g.maxSpd;
      gulls.push(g);
      newGullFlash=85;
      playSquawk();
    }

    for(const c of chips) c.draw();
    for(const d of dogs)  d.draw();
    for(const ca of cars)  ca.draw();
    for(const pu of pickups) pu.draw();
    for(const po of police) po.draw();
    for(const f of foodDrops) f.draw();
    for(const cy of cyclists) cy.draw();
    for(const di of diners)   di.draw();
    for(const bo of boats)    bo.draw();
    for(const sh of sharks)   sh.draw();
    if(helicopter) helicopter.draw();
    if(particles.length>600) particles.splice(0, particles.length-600);
    for(let i=particles.length-1;i>=0;i--){
      if(!particles[i].update()) particles.splice(i,1);
      else particles[i].draw();
    }
    for(const n of npcs)  n.draw();
    for(const g of gulls) g.draw();
    // Golden aura vignette during multiplier — subtle border glow
    if(scoreMultiplier>1){
      const aura=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.25,W/2,H/2,Math.max(W,H)*0.85);
      aura.addColorStop(0,'rgba(255,215,0,0)');
      aura.addColorStop(1,'rgba(255,215,0,0.28)');
      ctx.fillStyle=aura; ctx.fillRect(0,0,W,H);
    }
    // Brief gold flash on activation (fades fast)
    if(goldFlash>0){
      ctx.save(); ctx.globalAlpha=goldFlash*0.35;
      ctx.fillStyle='#ffd700'; ctx.fillRect(0,0,W,H);
      ctx.restore();
    }
    drawHUD();
    drawAchNotif();

  }else if(state==='gameover'){
    drawBackground();
    for(const c of chips) c.draw();
    for(const d of dogs)  d.draw();
    for(const ca of cars)  ca.draw();
    for(const pu of pickups) pu.draw();
    for(const po of police) po.draw();
    for(const f of foodDrops) f.draw();
    for(const cy of cyclists) cy.draw();
    for(const di of diners)   di.draw();
    for(const bo of boats)    bo.draw();
    for(const sh of sharks)   sh.draw();
    if(helicopter) helicopter.draw();
    for(const n of npcs)  n.draw();
    for(const g of gulls) g.draw();
    drawGameOver();
  }

  requestAnimationFrame(loop);
}

loop();
</script>

function resize() {

}

// ── HELPERS ────────────────────────────────────────────────
const rnd   = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

function rrPath(x, y, w, h, r) {
  if (ctx.roundRect) { ctx.roundRect(x, y, w, h, r); return; }
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);    ctx.quadraticCurveTo(x+w, y,     x+w, y+r);
  ctx.lineTo(x+w, y+h-r);  ctx.quadraticCurveTo(x+w, y+h,   x+w-r, y+h);
  ctx.lineTo(x+r, y+h);    ctx.quadraticCurveTo(x,   y+h,   x,     y+h-r);
  ctx.lineTo(x, y+r);      ctx.quadraticCurveTo(x,   y,     x+r,   y);
  ctx.closePath();
}
function fillRR(x, y, w, h, r, fill) {
  ctx.beginPath(); rrPath(x,y,w,h,r); ctx.fillStyle=fill; ctx.fill();
}
function fillStrokeRR(x, y, w, h, r, fill, stroke, lw=2) {
  ctx.beginPath(); rrPath(x,y,w,h,r);
  ctx.fillStyle=fill; ctx.fill();
  ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke();
}

function saveBest() {
  const finalScore=Math.floor(score*DIFF[difficulty].scoreMult);

    bestScores[difficulty]=finalScore;
    try { localStorage.setItem('squawk_best_'+difficulty, finalScore); } catch(e){}

  // Achievements checked at game end
  if(finalScore>=50000) unlockAch('legend');

// Notification queue
let achNotifQueue=[], achNotifCurrent=null, achNotifTimer=0;

function unlockAch(id){
  if(unlockedAch.has(id)) return;
  unlockedAch.add(id);
  try { localStorage.setItem('squawk_ach',JSON.stringify([...unlockedAch])); } catch(e){}
  achNotifQueue.push(id);
}

function drawAchNotif(){
  if(!achNotifCurrent && achNotifQueue.length>0){
    achNotifCurrent=achNotifQueue.shift(); achNotifTimer=210;
  }
  if(!achNotifCurrent) return;
  achNotifTimer--;
  if(achNotifTimer<=0){ achNotifCurrent=null; return; }
  const def=ACH.find(a=>a.id===achNotifCurrent);
  if(!def) return;
  const alpha=Math.min(1,achNotifTimer/25)*Math.min(1,(achNotifTimer-5)/30);
  const nx=W-188, ny=92;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.shadowBlur=16; ctx.shadowColor='#ffd700';
  fillRR(nx,ny,176,58,8,'rgba(0,0,0,0.85)');
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=1.5;
  ctx.beginPath(); rrPath(nx,ny,176,58,8); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffd700'; ctx.font='700 9px Nunito'; ctx.textAlign='left';
  ctx.fillText('✦ ACHIEVEMENT UNLOCKED',nx+8,ny+14);
  ctx.font='16px sans-serif'; ctx.fillText(def.icon,nx+8,ny+40);
  ctx.fillStyle='#fff'; ctx.font='700 12px Nunito';
  ctx.fillText(def.name,nx+34,ny+34);
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='10px Nunito';
  ctx.fillText(def.desc.length>38?def.desc.slice(0,36)+'…':def.desc,nx+34,ny+48);
  ctx.restore();
}

function drawAchievementScreen(){
  const bg=ctx.createLinearGradient(0,0,0,H_BASE);
  bg.addColorStop(0,'#1a1a2e'); bg.addColorStop(1,'#16213e');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H_BASE);
  ctx.textAlign='center';
  ctx.font='42px Bangers';
  ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=4; ctx.lineJoin='round';
  ctx.strokeText('ACHIEVEMENTS',W/2,52);
  ctx.fillStyle='#ffd700'; ctx.fillText('ACHIEVEMENTS',W/2,52);
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='700 11px Nunito';
  ctx.fillText(unlockedAch.size+' / '+ACH.length+' unlocked',W/2,70);

  const cols=2, cw=W/2-32;
  for(let i=0;i<ACH.length;i++){
    const col=i%cols, row=Math.floor(i/cols);
    const ax=(col===0?W/2-cw-8:W/2+8), ay=80+row*104;
    const unlocked=unlockedAch.has(ACH[i].id);
    fillRR(ax,ay,cw,92,8,unlocked?'rgba(255,215,0,0.1)':'rgba(255,255,255,0.04)');
    ctx.strokeStyle=unlocked?'rgba(255,215,0,0.45)':'rgba(255,255,255,0.08)'; ctx.lineWidth=1;
    ctx.beginPath(); rrPath(ax,ay,cw,92,8); ctx.stroke();
    // Icon — silhouette when locked
    if(unlocked){
      ctx.font='28px sans-serif'; ctx.textAlign='left';
      ctx.fillText(ACH[i].icon,ax+14,ay+46);
    } else {
      // Draw emoji as near-black silhouette using canvas filter
      ctx.save();
      if(ctx.filter!==undefined) ctx.filter='brightness(0) opacity(0.35)';
      ctx.font='28px sans-serif'; ctx.textAlign='left';
      ctx.fillText(ACH[i].icon,ax+14,ay+46);
      if(ctx.filter!==undefined) ctx.filter='none';
      ctx.restore();
    }
    // Name
    if(unlocked){
      ctx.fillStyle='#ffd700'; ctx.font='700 13px Nunito'; ctx.textAlign='left';
      ctx.fillText(ACH[i].name,ax+52,ay+28);
      ctx.fillStyle='rgba(255,255,255,0.65)'; ctx.font='11px Nunito';
      // Word-wrap description
      const words=ACH[i].desc.split(' '); let line='', ly=ay+44;
      for(const wd of words){
        const test=line+wd+' ';
        if(ctx.measureText(test).width>cw-60&&line){ctx.fillText(line.trim(),ax+52,ly);line=wd+' ';ly+=14;}
        else line=test;
      }
      ctx.fillText(line.trim(),ax+52,ly);
    } else {
      ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.font='700 13px Nunito'; ctx.textAlign='left';
      ctx.fillText('???',ax+52,ay+28);
      ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.font='11px Nunito';
      ctx.fillText('Keep playing to unlock...',ax+52,ay+44);
    }
  }

  // Back button
  ctx.save();
  ctx.shadowBlur=14; ctx.shadowColor='#ffd700';
  fillRR(W/2-80,H_BASE-55,160,40,10,'rgba(255,215,0,0.25)');

  if(ctx.letterSpacing!==undefined) ctx.letterSpacing='0px';
  ctx.restore();
}

// ── GULL ───────────────────────────────────────────────────
// Each gull is either RESTING (sitting on sand) or AIRBORNE (flying).
// Chips launch resting gulls and override boid rules for airborne ones.
// Dogs scatter both resting and airborne gulls dramatically.

class Gull {
  constructor(x, y) {
    this.x  = x != null ? x : rnd(80, W-80);
    this.y  = y != null ? y : rnd(110, H-55);
    this.vx = 0; this.vy = 0;
    this.maxSpd   = rnd(2.2, 3.0);
    this.sz       = rnd(8, 11);
    this.wp       = rnd(0, Math.PI*2);  // wing animation phase
    this.faceAng  = -Math.PI/2;          // face up (north) when resting
    this.airborne = false;
    this.settleTimer = 0;  // frames left before friction/landing kicks in
  }

  update() {
    // ── Find nearest chip ──────────────────────────────────
    let nearChip = null, nearChipDist = Infinity;
    for (const c of chips) {
      const d = Math.hypot(c.x-this.x, c.y-this.y);
      if (d < nearChipDist) { nearChipDist = d; nearChip = c; }
    }
    const hasChip = chips.length > 0;

    // ── Find nearest dog's scare radius ───────────
    let nearDog = null, nearDogDist = Infinity;
    for (const dog of dogs) {
      // Scare radius centred on the dog itself, not the owner
      const d = Math.hypot(dog.dogX-this.x, dog.dogY-this.y);
      if (d < dog.r && d < nearDogDist) { nearDogDist = d; nearDog = dog; }
    }

    // ═══════════════ RESTING ═══════════════════════════════
    if (!this.airborne) {
      if (nearDog) {
        // SCATTER! Explosive launch away from dog
        this.airborne = true;
        this.settleTimer = 200;
        const dx=this.x-nearDog.dogX, dy=this.y-nearDog.dogY;
        const d=Math.hypot(dx,dy)+0.001;
        this.vx = (dx/d)*this.maxSpd*2.5 + rnd(-0.8,0.8);
        this.vy = (dy/d)*this.maxSpd*2.5 + rnd(-0.8,0.8);
        // Feather burst — visual clue that dog just scattered the flock
        if (Math.random()<0.45) {
          const p=new Particle(this.x+rnd(-6,6), this.y+rnd(-4,4), 1);
          p.text='🪶'; p.col='#e0e0e0';
          p.vx=rnd(-1.5,1.5); p.vy=rnd(-2.5,-0.5);
          p.dec=0.012;  // float longer
          particles.push(p);
        }
      } else if (hasChip && nearChipDist < 420) {
        // LAUNCH toward chip
        this.airborne = true;
        this.settleTimer = 90;
        const dx=nearChip.x-this.x, dy=nearChip.y-this.y;
        const d=Math.hypot(dx,dy)+0.001;
        this.vx = (dx/d)*this.maxSpd*0.7 + rnd(-0.3,0.3);
        this.vy = (dy/d)*this.maxSpd*0.7 + rnd(-0.3,0.3);
      } else {
        // Idle shuffle on sand
        this.vx *= 0.72; this.vy *= 0.72;
        this.vx += rnd(-0.018,0.018); this.vy += rnd(-0.018,0.018);
        this.x += this.vx; this.y += this.vy;
        this.x = clamp(this.x, 12, W-12);
        this.y = clamp(this.y, 100, H-48);
        this.wp += 0.025;
        return;
      }
    }

    // ═══════════════ AIRBORNE ══════════════════════════════
    let fx=0, fy=0;

    if (nearDog) {
      // ── Strong flee from dog ─────────────────────────────
      const dx=this.x-nearDog.dogX, dy=this.y-nearDog.dogY;
      const d=Math.hypot(dx,dy)+0.001;
      const str = 0.9*(1-nearDogDist/nearDog.r);
      fx += (dx/d)*str;
      fy += (dy/d)*str;
      this.settleTimer = 200; // keep flying after a scare

      // Light separation so they don't pile up
      for (const o of gulls) {
        if (o===this) continue;
        const ddx=this.x-o.x, ddy=this.y-o.y;
        const dd=Math.hypot(ddx,ddy)+0.001;
        if (dd < 22) { fx+=ddx/dd*1.2; fy+=ddy/dd*1.2; }
      }

    } else if (nearChip && nearChipDist < 280) {
      // ── CHIP OVERRIDE: ignore boid rules, go straight to chip ─
      const dx=nearChip.x-this.x, dy=nearChip.y-this.y;
      const d=Math.hypot(dx,dy)+0.001;
      fx += (dx/d)*0.42;
      fy += (dy/d)*0.42;
      this.settleTimer = Math.max(this.settleTimer, 90); // reset while near chip

      // Only separation so they don't stack on the chip
      for (const o of gulls) {
        if (o===this) continue;
        const ddx=this.x-o.x, ddy=this.y-o.y;
        const dd=Math.hypot(ddx,ddy)+0.001;
        if (dd < 22) { fx+=ddx/dd*0.9; fy+=ddy/dd*0.9; }
      }

    } else if (nearChip && nearChipDist < 500) {
      // ── Weaker chip pull at range + light boid ───────────
      const dx=nearChip.x-this.x, dy=nearChip.y-this.y;
      const d=Math.hypot(dx,dy)+0.001;
      fx += (dx/d)*0.14;
      fy += (dy/d)*0.14;
      this.settleTimer = Math.max(this.settleTimer, 45);
      // Light separation + alignment so flock travels together toward chip
      let sx=0,sy=0,sc=0, ax=0,ay=0,ac=0;
      for (const o of gulls) {
        if (o===this || !o.airborne) continue;
        const ddx=this.x-o.x, ddy=this.y-o.y;
        const dd=Math.hypot(ddx,ddy)+0.001;
        if (dd<26) { sx+=ddx/dd; sy+=ddy/dd; sc++; }
        if (dd<62) { ax+=o.vx;   ay+=o.vy;   ac++; }
      }
      if (sc) { fx+=sx/sc*1.2; fy+=sy/sc*1.2; }
      if (ac) { fx+=(ax/ac-this.vx)*0.06; fy+=(ay/ac-this.vy)*0.06; }

    } else {
      // ── No chip: boid + settle ───────────────────────────
      this.settleTimer = Math.max(0, this.settleTimer-1);

      let sx=0,sy=0,sc=0, ax=0,ay=0,ac=0, cx=0,cy=0,cc=0;
      for (const o of gulls) {
        if (o===this || !o.airborne) continue;
        const dx=this.x-o.x, dy=this.y-o.y;
        const d=Math.hypot(dx,dy)+0.001;
        if (d<26) { sx+=dx/d; sy+=dy/d; sc++; }
        if (d<62) { ax+=o.vx; ay+=o.vy; ac++; }
        if (d<88) { cx+=o.x;  cy+=o.y;  cc++; }
      }
      if (sc) { fx+=sx/sc*1.8;            fy+=sy/sc*1.8; }
      if (ac) { fx+=(ax/ac-this.vx)*0.09; fy+=(ay/ac-this.vy)*0.09; }
      if (cc) { fx+=(cx/cc-this.x)*0.007; fy+=(cy/cc-this.y)*0.007; }

      if (this.settleTimer <= 0) {
        // Friction: slow down and drift back to visible area
        this.vx *= 0.96; this.vy *= 0.96;
        if (this.x < 35)   fx += 0.06;
        if (this.x > W-35) fx -= 0.06;
        if (this.y < 100)  fy += 0.06;
        if (this.y > H-48) fy -= 0.06;
        // Land when slow enough
        if (Math.hypot(this.vx,this.vy) < 0.22) {
          this.airborne = false;
          this.vx=0; this.vy=0;
          this.faceAng = -Math.PI/2;  // always face up when landing
          this.x = clamp(this.x,12,W-12);
          this.y = clamp(this.y,100,H-48);
          return;
        }
      } else {
        // Wander while still in settle window
        fx += rnd(-0.07,0.07); fy += rnd(-0.07,0.07);
      }
    }

    // ── Apply forces ──────────────────────────────────────
    this.vx += fx; this.vy += fy;
    const spd = Math.hypot(this.vx,this.vy);
    if (spd > this.maxSpd)  { this.vx*=this.maxSpd/spd; this.vy*=this.maxSpd/spd; }
    if (spd < 0.3 && hasChip) { this.vx+=rnd(-0.3,0.3); this.vy+=rnd(-0.3,0.3); }

    this.x += this.vx; this.y += this.vy;
    this.wp += 0.18;

    // Left/right wrap, top/bottom soft bounce (no more disappearing into ocean or road)
    if (this.x < -6)  this.x = W+6;
    if (this.x > W+6) this.x = -6;
    if (this.y < 0)   { this.y=0;  this.vy=Math.abs(this.vy)*0.5; }
    if (this.y > H+6) { this.y=H+6; this.vy=-Math.abs(this.vy)*0.5; }
  }

  draw() {
    const ang = this.airborne
      ? Math.atan2(this.vy, this.vx)
      : this.faceAng;
    const s  = this.sz;
    const wb = Math.sin(this.wp) * (this.airborne ? 0.28 : 0.06);

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(ang + Math.PI/2);

    if (!this.airborne) {
      // Ground shadow when resting
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.ellipse(1, s*0.6, s*1.1, s*0.25, 0, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.shadowBlur    = this.airborne ? 5 : 2;
    ctx.shadowColor   = 'rgba(0,0,0,0.2)';
    ctx.shadowOffsetY = this.airborne ? 1.5 : 0.5;

    if (this.airborne) {
      // Flying: extended wings
      ctx.fillStyle = '#f0f0f0';
      ctx.beginPath();
      ctx.ellipse(0,0, s*0.37, s*0.72, 0,0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#e4e4e4';
      const lw = s*(1.12+wb);
      ctx.beginPath();
      ctx.moveTo(-s*0.22,-s*0.1);
      ctx.quadraticCurveTo(-lw,-s*0.44,-lw*0.65,s*0.5);
      ctx.lineTo(-s*0.22,s*0.28); ctx.closePath(); ctx.fill();
      const rw = s*(1.12-wb);
      ctx.beginPath();
      ctx.moveTo(s*0.22,-s*0.1);
      ctx.quadraticCurveTo(rw,-s*0.44,rw*0.65,s*0.5);
      ctx.lineTo(s*0.22,s*0.28); ctx.closePath(); ctx.fill();
    } else {
      // Resting: plump body, wings tucked
      ctx.fillStyle = '#e8e8e8';
      ctx.beginPath();
      ctx.ellipse(0,0, s*0.46, s*0.58, 0,0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#d8d8d8';
      const fw = s*(0.58+wb);
      ctx.beginPath();
      ctx.moveTo(-s*0.32,-s*0.08);
      ctx.quadraticCurveTo(-fw,s*0.08,-fw*0.8,s*0.46);
      ctx.lineTo(-s*0.32,s*0.38); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s*0.32,-s*0.08);
      ctx.quadraticCurveTo(fw,s*0.08,fw*0.8,s*0.46);
      ctx.lineTo(s*0.32,s*0.38); ctx.closePath(); ctx.fill();
    }

    ctx.shadowBlur=0; ctx.shadowOffsetY=0;

    ctx.fillStyle = '#f0a020';
    ctx.beginPath();
    ctx.moveTo(-2.2,-s*0.68); ctx.lineTo(2.2,-s*0.68); ctx.lineTo(0,-s*1.04);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(s*0.1,-s*0.2,1.4,0,Math.PI*2); ctx.fill();

    ctx.restore();
  }
}

// ── NPC ────────────────────────────────────────────────────
const NPC_COLS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];

class NPC {
  constructor() {
    this.col       = NPC_COLS[Math.floor(rnd(0,NPC_COLS.length))];
    this.sz        = rnd(9,13);
    this.panic     = 0;
    this.wt        = rnd(0,150);
    this.x         = rnd(60,W-60);
    this.y         = rnd(115,H-55);
    this.tx        = this.x; this.ty = this.y;
    this.leaving   = false;
    this.stayTimer = rnd(1800, 5000);
    this.stunTimer = 0;   // freeze frames on first gull contact before fleeing
  }

  update() {
    // ── Stay timer: voluntary departure ─────────────────
    if (!this.leaving && this.panic <= 0) {
      this.stayTimer--;
      if (this.stayTimer <= 0) {
        this.leaving = true;
        this.leavingTimer = 0;
        // Walk to nearest edge (edge-aware: target is 100px past closest boundary)
        const exits = [
          {dx:0,  dy:1,  t:(H+100-this.y)},   // bottom
          {dx:-1, dy:0,  t:(this.x+100)},       // left
          {dx:1,  dy:0,  t:(W+100-this.x)},     // right
        ];
        const best = exits.reduce((a,b)=>a.t<b.t?a:b);
        this.tx = this.x + best.dx*best.t;
        this.ty = this.y + best.dy*best.t;
      }
    }

    // ── Wander target ────────────────────────────────────
    this.wt--;
    if (this.wt<=0 && this.panic<=0 && !this.leaving) {
      this.wt=rnd(80,160); this.tx=rnd(60,W-60); this.ty=rnd(115,H-55);
    }

    // ── Gull detection (airborne only) ───────────────────
    let nd=Infinity, ng=null, nearbyAirborne=0;
    for (const g of gulls) {
      if (!g.airborne) continue;
      const d=Math.hypot(g.x-this.x, g.y-this.y);
      if (d<nd) { nd=d; ng=g; }
      if (d<65) nearbyAirborne++;
    }

    const mult = nearbyAirborne>=10 ? 4.0
               : nearbyAirborne>= 5 ? 2.5
               : nearbyAirborne>= 3 ? 1.5
               : 1.0;

    if (nd<55 && ng && !this.leaving) {
      score       += 0.025*mult*scoreMultiplier;
      growthMeter += 0.025*mult;
      if (Math.random()<0.018) particles.push(new Particle(this.x, this.y-this.sz*1.5, mult));

      const wasCalm = (this.panic===0);
      this.panic = 65;
      if (wasCalm) this.stunTimer=22;

      if (this.stunTimer>0) {
        this.stunTimer--;
        // Frozen during stun — shake in place
      } else {
        // Post-stun: flee on-screen so NPCs stay chaseable/steerable
        // (allows future mechanic of herding NPCs into traffic)
        const dx=this.x-ng.x, dy=this.y-ng.y, d=Math.hypot(dx,dy)+0.001;
        const fleeX=this.x+(dx/d)*180, fleeY=this.y+(dy/d)*180;
        const nearEdge=this.x<80||this.x>W-80||this.y<150||this.y>H-70;
        if (nearEdge && (fleeX<20||fleeX>W-20||fleeY<88||fleeY>H-10)) {
          // At edge AND fleeing toward it — exit the screen
          this.leaving=true;
          this.leavingTimer=0;
          // Edge-aware overshoot: travel to 100px past the nearest canvas boundary
          const ndx=dx/d, ndy=dy/d;
          const exits=[];
          if(ndx> 0.001) exits.push((W+100-this.x)/ndx);
          if(ndx<-0.001) exits.push((-100-this.x)/ndx);
          if(ndy> 0.001) exits.push((H+100-this.y)/ndy);
          if(ndy<-0.001) exits.push((-100-this.y)/ndy);
          const dist = exits.length ? Math.min(...exits.filter(t=>t>0)) : 800;
          this.tx=this.x+ndx*dist;
          this.ty=this.y+ndy*dist;
        } else {
          // Mid-beach: bounce around toward safety, update each frame (chaseable)
          this.tx=clamp(fleeX,40,W-40);
          this.ty=clamp(fleeY,100,H-55);
        }
      }
    } else if (this.panic>0) {
      this.panic--;
      if (this.stunTimer>0) this.stunTimer--;
      if (this.panic===0) this.stunTimer=0;
    }

    // ── Social contagion ─────────────────────────────────
    if (this.panic<=0 && !this.leaving) {
      for (const other of npcs) {
        if (other===this || other.panic<=30) continue;
        if (Math.hypot(other.x-this.x,other.y-this.y)<52 && Math.random()<0.004) {
          this.panic=28;
          this.tx=clamp(this.x+rnd(-120,120),30,W-30);
          this.ty=clamp(this.y+rnd(-60,60),95,H-30);
        }
      }
    }

    // ── Movement ─────────────────────────────────────────
    const dx=this.tx-this.x, dy=this.ty-this.y, dd=Math.hypot(dx,dy);
    if (this.leaving) {
      this.leavingTimer=(this.leavingTimer||0)+1;
      const spd=4.0;
      if (dd>2) { this.x+=(dx/dd)*spd; this.y+=(dy/dd)*spd; }
      if (this.x<-60||this.x>W+60||this.y<-60||this.y>H+60||this.leavingTimer>500)
        return false;
    } else {
      const spd=this.panic>0 ? 2.8 : 0.8;
      if (dd>3) { this.x+=(dx/dd)*spd; this.y+=(dy/dd)*spd; }
      // Soft avoidance: NPCs feel uncomfortable near road (H_STAGE2) and harbor (H_STAGE3)
      if (this.y > H_STAGE2-60 && !this.panic) {
        this.ty = Math.min(this.ty, H_STAGE2-80);  // nudge target back onto promenade
        this.y -= 0.35;
      }
      if (this.y > H_STAGE3-40) this.y -= 0.8;   // hard push away from harbor edge
      this.x=clamp(this.x,30,W-30); this.y=clamp(this.y,95,H-30);
    }

    return true;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x,this.y);
    if (this.panic>40) ctx.translate(rnd(-1.5,1.5),rnd(-1.5,1.5));
    const s=this.sz;
    ctx.fillStyle='rgba(0,0,0,0.11)';
    ctx.beginPath(); ctx.ellipse(0,s*0.62,s*0.65,s*0.18,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.ellipse(0,0,s*0.48,s*0.68,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f5cba7';
    ctx.beginPath(); ctx.arc(0,-s*0.88,s*0.36,0,Math.PI*2); ctx.fill();
    if (this.panic>40) {
      ctx.font=Math.floor(s*1.1)+'px sans-serif';
      ctx.textAlign='center'; ctx.fillText('😱',0,-s*1.7);
    }
    ctx.restore();
  }
}

// ── SPAWN NPC from edge ────────────────────────────────────
function spawnNPC() {
  const n    = new NPC();
  // NPCs only belong on beach + promenade — road/sidewalk is police territory
  const maxY = stage>=2 ? H_STAGE2-55 : H_BASE-55;
  const side = Math.floor(rnd(0,3));
  if      (side===0) { n.x=-18;          n.y=rnd(115,maxY); }
  else if (side===1) { n.x=W+18;         n.y=rnd(115,maxY); }
  else               { n.x=rnd(40,W-40); n.y=H_BASE+18;     }  // bottom entry = promenade top
  n.tx=rnd(100,W-100);
  n.ty=rnd(130,maxY-20);
  n.stayTimer=rnd(1800,5000);
  npcs.push(n);
}

// ── DOG WALKER ─────────────────────────────────────────────
// Owner walks a straight path from one edge to the opposite.
// Dog detects nearby gulls and pulls the owner toward them.
// Player can use chips to lure gulls OUT of the dog's path —
// which paradoxically pulls the dog (and owner) toward the exit faster.
class DogWalker {
  constructor() {
    const horiz = Math.random() < 0.62;
    if (horiz) {
      const fromLeft = Math.random() < 0.5;
      this.x     = fromLeft ? -32 : W+32;
      this.y     = rnd(115, H_BASE-60);
      this.exitX = fromLeft ? W+220 : -220;
      this.exitY = rnd(115, H_BASE-60);
    } else {
      this.x     = rnd(50, W-50);
      this.y     = H_BASE+32;
      this.exitX = rnd(50, W-50);
      this.exitY = -220;
    }
    this.spd   = rnd(0.9, 1.5);
    this.r     = DIFF[difficulty].dogR + rnd(-12,12);
    this.baseR = this.r;
    this.alive = true;
    this.dogX  = this.x;
    this.dogY  = this.y;
    this.leashAng  = 0;
    this.neutralized   = false;  // true after eating a chip
    this.neutralEmoji  = 0;      // countdown for 😋 display
  }

  update() {
    const edx = this.exitX - this.x;
    const edy = this.exitY - this.y;
    const ed  = Math.hypot(edx, edy) + 0.001;

    // ── Chip eating: neutralises the dog ─────────────────
    if (!this.neutralized) {
      for (const chip of chips) {
        if (chip.life <= 20) continue;
        if (Math.hypot(chip.x-this.dogX, chip.y-this.dogY) < 38) {
          chip.life = 0;          // eaten!
          this.neutralized = true;
          this.neutralEmoji = 200;
          this.r = 0;             // scare radius gone
          // Crumb burst
          for (let i=0;i<5;i++){
            const p=new Particle(this.dogX+rnd(-12,12),this.dogY+rnd(-8,8),1);
            p.text=['😋','🦴','✦'][Math.floor(rnd(0,3))];
            p.col='#fdcb6e';
            particles.push(p);
          }
          break;
        }
      }
    }
    if (this.neutralEmoji>0) this.neutralEmoji--;

    // ── Dog pull (skip gulls closer than 18px to owner — prevents spaz) ─
    let pullX=0, pullY=0, nearDist=Infinity;
    if (!this.neutralized) {
      for (const g of gulls) {
        const d = Math.hypot(g.x-this.x, g.y-this.y);
        if (d < 18) continue;   // too close → skip (zero-vector source of spaz)
        if (d < 210 && d < nearDist) {
          nearDist = d;
          pullX = g.x - this.x;
          pullY = g.y - this.y;
        }
      }
    }
    const hasPull = !this.neutralized && nearDist < 210;
    const pullD   = Math.hypot(pullX, pullY) + 0.001;
    const pullStr = hasPull ? 0.55*(1-nearDist/210) : 0;

    // ── Owner movement ────────────────────────────────────
    let mvx = edx/ed + (hasPull ? (pullX/pullD)*pullStr : 0);
    let mvy = edy/ed + (hasPull ? (pullY/pullD)*pullStr : 0);
    const mvd = Math.hypot(mvx, mvy) + 0.001;
    this.x += (mvx/mvd) * this.spd;
    this.y += (mvy/mvd) * this.spd;

    // ── Dog position: lerp toward target (smooth, no spaz) ─
    const leashLen = 40;
    const targetDogX = this.x + (hasPull ? (pullX/pullD) : (mvx/mvd)) * leashLen;
    const targetDogY = this.y + (hasPull ? (pullY/pullD) : (mvy/mvd)) * leashLen;
    this.dogX += (targetDogX - this.dogX) * 0.14;  // lerp — smooth tracking
    this.dogY += (targetDogY - this.dogY) * 0.14;
    this.leashAng = Math.atan2(this.dogY-this.y, this.dogX-this.x);

    if (this.x<-55||this.x>W+55||this.y<-55||this.y>H+55) this.alive=false;
  }

  draw() {
    ctx.save();

    // Scare radius — hidden when neutralized
    if (!this.neutralized) {
      const cx=(this.x+this.dogX)*0.5, cy=(this.y+this.dogY)*0.5;
      ctx.beginPath(); ctx.arc(cx,cy,this.r,0,Math.PI*2);
      ctx.fillStyle='rgba(101,67,33,0.06)'; ctx.fill();
      ctx.strokeStyle='rgba(101,67,33,0.25)'; ctx.lineWidth=1.5;
      ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
    }

    // Leash
    ctx.strokeStyle='#777'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(this.dogX,this.dogY); ctx.stroke();

    // Owner
    ctx.fillStyle='#2d3436';
    ctx.beginPath(); ctx.ellipse(this.x,this.y,7,10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f5cba7';
    ctx.beginPath(); ctx.arc(this.x,this.y-13,6,0,Math.PI*2); ctx.fill();

    // Dog body
    ctx.save();
    ctx.translate(this.dogX, this.dogY);
    ctx.rotate(this.leashAng);
    ctx.fillStyle = this.neutralized ? '#a0785a' : '#8B4513';  // duller when satisfied
    ctx.beginPath(); ctx.ellipse(0,0,10,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = this.neutralized ? '#8a6040' : '#7a3b12';
    ctx.beginPath(); ctx.arc(10,0,5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = this.neutralized ? '#a0785a' : '#8B4513'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(-14,-5); ctx.stroke();
    ctx.restore();

    // Labels — only show satisfied emoji, no DOG! text
    ctx.font='bold 9px Nunito'; ctx.textAlign='center';
    if (this.neutralEmoji>0) {
      ctx.globalAlpha=Math.min(1,this.neutralEmoji/30);
      ctx.font='16px sans-serif';
      ctx.fillText('😋', this.dogX, this.dogY-18);
      ctx.globalAlpha=1;
    }

    ctx.restore();
  }
}

// ── CHIP ───────────────────────────────────────────────────
class Chip {
  constructor(x,y) { this.x=x; this.y=y; this.life=310; this.t=0; }
  update() { this.life--; this.t+=0.15; return this.life>0; }
  draw() {
    const alpha=Math.min(1,this.life/40);
    ctx.save(); ctx.globalAlpha=alpha; ctx.translate(this.x,this.y);
    ctx.beginPath(); ctx.arc(0,0,175,0,Math.PI*2);
    ctx.fillStyle='rgba(255,215,50,0.04)'; ctx.fill();
    ctx.strokeStyle='rgba(255,215,50,0.13)'; ctx.lineWidth=1; ctx.stroke();
    [[-4,-2,0.3],[-1,0,0],[3,2,-0.25]].forEach(([ox,oy,rot],i)=>{
      ctx.save(); ctx.translate(ox,oy); ctx.rotate(rot);
      ctx.fillStyle=i%2===0?'#f5a623':'#fdd835';
      ctx.shadowBlur=7; ctx.shadowColor='rgba(255,200,0,0.55)';
      ctx.beginPath(); rrPath(-6,-3.5,14,8,2); ctx.fill();
      ctx.restore();
    });
    ctx.shadowBlur=0;
    for(let i=0;i<3;i++){
      const a=this.t+i*Math.PI*2/3, r=13+Math.sin(this.t*2+i)*3.5;
      ctx.fillStyle='rgba(255,255,140,0.8)';
      ctx.beginPath(); ctx.arc(Math.cos(a)*r,Math.sin(a)*r,1.8,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

// ── PARTICLE ───────────────────────────────────────────────
const PANIC_TEXTS = ['!','?!','!!','✦','~'];
class Particle {
  constructor(x, y, mult=1) {
    this.x=x; this.y=y;
    this.vx=rnd(-2,2); this.vy=rnd(-3,-1);
    this.life=1; this.dec=rnd(0.018,0.03);
    this.sz=rnd(10,14) + (mult-1)*3;  // bigger for larger flocks
    this.text = mult>=3 ? ['💥','🌊','!!!'][Math.floor(rnd(0,3))]
                        : PANIC_TEXTS[Math.floor(rnd(0,PANIC_TEXTS.length))];
    this.col=['#e74c3c','#f39c12','#fdcb6e','#e17055'][Math.floor(rnd(0,4))];
  }
  update() {
    this.x+=this.vx; this.y+=this.vy; this.vy+=0.05;
    this.life-=this.dec; return this.life>0;
  }
  draw() {
    ctx.save(); ctx.globalAlpha=Math.max(0,this.life);
    ctx.fillStyle=this.col; ctx.font='bold '+this.sz+'px Nunito';
    ctx.textAlign='center'; ctx.fillText(this.text,this.x,this.y);
    ctx.restore();
  }
}

// ── CYCLIST ────────────────────────────────────────────────
// Fast promenade crossers. Don't scatter gulls. Swerve wildly when swarmed.
class Cyclist {
  constructor() {
    this.fromLeft = Math.random() < 0.5;
    this.x  = this.fromLeft ? -25 : W+25;
    this.y  = rnd(H_BASE+28, H_STAGE2-25);  // promenade zone only, never road
    this.spd  = rnd(2.6, 4.0);
    this.wobble = 0; this.wobbleV = 0;
    this.alive  = true;
    this.col  = NPC_COLS[Math.floor(rnd(0,NPC_COLS.length))];
  }
  update() {
    this.x += this.fromLeft ? this.spd : -this.spd;
    this.wobbleV += rnd(-0.04,0.04);
    this.wobbleV *= 0.85;
    this.wobble  += this.wobbleV;
    this.wobble  *= 0.88;

    // Nearby airborne gulls cause swerve + score
    let nearby=0, nd=Infinity;
    for (const g of gulls) {
      if (!g.airborne) continue;
      const d=Math.hypot(g.x-this.x, g.y-this.y);
      if (d<nd) nd=d;
      if (d<55) nearby++;
    }
    const mult = nearby>=5?2.5 : nearby>=3?1.5 : 1.0;
    if (nd<52) {
      this.wobbleV += rnd(-1.8,1.8);
      score       += 0.15*mult*scoreMultiplier;   // 1.5× base vs regular NPCs — harder to catch
      growthMeter += 0.15*mult;
      if (Math.random()<0.016) particles.push(new Particle(this.x, this.y-18, mult));
    }
    this.y = clamp(this.y+this.wobble*0.35, H_BASE+22, H_STAGE2-20);
    if (this.x<-65 || this.x>W+65) this.alive=false;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y+this.wobble);
    if (!this.fromLeft) ctx.scale(-1,1);
    // Wheels
    ctx.strokeStyle='#444'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(-11,5,7,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(11,5,7,0,Math.PI*2);  ctx.stroke();
    // Frame
    ctx.strokeStyle='#e74c3c'; ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(-11,5); ctx.lineTo(2,-4); ctx.lineTo(11,5);
    ctx.moveTo(2,-4);  ctx.lineTo(3,-10);
    ctx.moveTo(-4,-4); ctx.lineTo(3,-10);
    ctx.stroke();
    // Handlebar
    ctx.strokeStyle='#666'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(9,-2); ctx.lineTo(14,0); ctx.stroke();
    // Rider body (leaning forward)
    ctx.save(); ctx.translate(2,-9); ctx.rotate(0.35);
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.ellipse(0,0,4,7,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // Head + helmet
    ctx.fillStyle='#f5cba7';
    ctx.beginPath(); ctx.arc(8,-14,4.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(8,-18,4.5,Math.PI,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── FOOD DROP ──────────────────────────────────────────────
// Left behind when a Diner is scared. First gull to reach it
// returns one chip charge instantly.
class FoodDrop {
  constructor(x,y) { this.x=x; this.y=y; this.life=480; this.t=0; }
  update() {
    this.life--; this.t+=0.1;
    // Check for any airborne gull arriving
    for (const g of gulls) {
      if (g.airborne && Math.hypot(g.x-this.x,g.y-this.y)<30) {
        chipCharges=Math.min(CHIP_MAX, chipCharges+1);
        for(let i=0;i<8;i++){
          const p=new Particle(this.x+rnd(-16,16),this.y+rnd(-10,10),1.5);
          p.text=['✦','★','·'][Math.floor(rnd(0,3))];
          p.col='#fdcb6e'; particles.push(p);
        }
        return false; // consumed
      }
    }
    return this.life>0;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha=Math.min(1,this.life/40);
    ctx.translate(this.x,this.y);
    ctx.shadowBlur=10+Math.sin(this.t)*4; ctx.shadowColor='rgba(255,200,0,0.7)';
    ctx.font='15px sans-serif'; ctx.textAlign='center';
    ctx.fillText('🍟',0,5);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,215,50,0.85)';
    ctx.font='bold 8px Nunito'; ctx.textAlign='center';
    ctx.fillText('+CHIP',0,-9);
    ctx.restore();
  }
}

// ── DINER ──────────────────────────────────────────────────
// Seated at promenade restaurant tables. Drop food when scared.
// Table positions match the storefront drawing in drawStorefronts().
const DINER_SEATS = [
  {x:130, y:H_STAGE2-83},   // pizza table
  {x:420, y:H_STAGE2-83},   // cafe table
  {x:690, y:H_STAGE2-83},   // gelato table
];

class Diner {
  constructor(seat) {
    this.x   = seat.x + rnd(-10,10);
    this.y   = seat.y + rnd(-3,3);
    this.col = NPC_COLS[Math.floor(rnd(0,NPC_COLS.length))];
    this.sz  = rnd(8,11);
    this.panic   = 0;
    this.scared  = false;  // has already dropped food
    this.leaving = false;
    this.vy      = 0;
  }
  update() {
    if (this.leaving) {
      this.vy += 0.15; this.y += this.vy;
      if (this.panic>0) this.panic--;
      if (this.y>H+55) return false;  // off screen
      return true;
    }
    if (this.scared) return true;

    // Gull detection
    let nd=Infinity, ng=null, nearbyAirborne=0;
    for (const g of gulls) {
      if (!g.airborne) continue;
      const d=Math.hypot(g.x-this.x,g.y-this.y);
      if (d<nd){nd=d;ng=g;}
      if (d<65) nearbyAirborne++;
    }
    const mult=nearbyAirborne>=10?4.0:nearbyAirborne>=5?2.5:nearbyAirborne>=3?1.5:1.0;

    if (nd<55 && ng) {
      this.scared=true; this.leaving=true; this.panic=65;
      foodDrops.push(new FoodDrop(this.x, this.y));
      score       += 0.35*mult*scoreMultiplier;
      growthMeter += 0.35*mult;
      for(let i=0;i<4;i++) particles.push(new Particle(this.x+rnd(-12,12),this.y-this.sz,mult));
    } else if (this.panic>0) { this.panic--; }
    return true;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x,this.y);
    if (this.panic>30) ctx.translate(rnd(-1,1),rnd(-1,1));
    const s=this.sz;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.1)';
    ctx.beginPath(); ctx.ellipse(0,s*0.5,s*0.5,s*0.14,0,0,Math.PI*2); ctx.fill();
    // Body (seated — shorter)
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.ellipse(0,0,s*0.4,s*0.52,0,0,Math.PI*2); ctx.fill();
    // Head
    ctx.fillStyle='#f5cba7';
    ctx.beginPath(); ctx.arc(0,-s*0.72,s*0.3,0,Math.PI*2); ctx.fill();
    if (this.panic>30){
      ctx.font=Math.floor(s*0.9)+'px sans-serif';
      ctx.textAlign='center'; ctx.fillText('😱',0,-s*1.45);
    }
    ctx.restore();
  }
}

// ── CAR ────────────────────────────────────────────────────
// Crosses the road zone (stage 3). Removes any gull it hits.
// Two lanes: upper goes left→right, lower goes right→left.
class Car {
  constructor() {
    this.fromLeft = Math.random() < 0.5;
    const lane = Math.random() < 0.5 ? 0 : 1;
    this.fromLeft = lane===0; // lane 0 = left→right, lane 1 = right→left
    this.x   = this.fromLeft ? -40 : W+40;
    this.y   = H_STAGE2+32 + lane*58 + rnd(-6,6);
    const [cmin,cmax]=DIFF[difficulty].carSpd;
    this.spd = rnd(cmin, cmax);
    this.w   = 38; this.h = 19;
    this.col = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e67e22','#1abc9c','#fff'][Math.floor(rnd(0,8))];
    this.alive   = true;
    this.crashed = false;   // true after hitting an NPC
    this.crashAngle = 0;
    this.wreckLife  = 0;
  }
  update() {
    // Crashed wreck — smoke, then despawn
    if (this.crashed) {
      this.wreckLife--;
      if (this.wreckLife<=0) this.alive=false;
      return;
    }

    this.x += this.fromLeft ? this.spd : -this.spd;

    // NPC crash: any NPC in road zone hits the car → crash + big score
    for (let i=npcs.length-1; i>=0; i--) {
      const n=npcs[i];
      if (n.y>H_STAGE2 && n.y<H_STAGE3 &&
          Math.abs(n.x-this.x)<this.w && Math.abs(n.y-this.y)<this.h*1.8) {
        this.crashed=true; this.wreckLife=2400; this.crashAngle=rnd(-0.35,0.35);
        npcs.splice(i,1);
        const crashGain=150*scoreMultiplier;
        score+=crashGain; growthMeter+=25;
        scorePopup(this.x, this.y-20, crashGain, '#e74c3c');
        playCarCrash();
        runCarCrashes++;
        if(runCarCrashes>=10) unlockAch('road_rage');
        addScorchMark(this.x, this.y);
        for(let j=0;j<10;j++){
          const p=new Particle(this.x+rnd(-22,22),this.y+rnd(-14,14),3);
          p.text=['💥','🔥','!!!','💢'][Math.floor(rnd(0,4))];
          p.col='#e74c3c'; p.sz=rnd(14,22); p.dec=0.008; particles.push(p);
        }
        return; // stop all other processing this frame
      }
    }

    // Kill gulls in path — y-gate skips gulls not near road, cap at 5/frame
    let kills=0;
    for (let i=gulls.length-1; i>=0 && kills<5; i--) {
      const g=gulls[i];
      if (g.y < H_STAGE2-10 || g.y > H_STAGE3+10) continue; // not in road zone, skip
      if (Math.abs(g.x-this.x)<this.w*0.65 && Math.abs(g.y-this.y)<this.h*0.85) {
        gulls.splice(i,1); kills++;
        statGullsKilled++;
      }
    }
    if (kills>0 && Math.random()<0.75) {
      const p=new Particle(this.x+rnd(-8,8),this.y+rnd(-6,6),1);
      p.text='🪶'; p.col='#e8e8e8';
      p.vx=(this.fromLeft?-1:1)*rnd(1,2.5)+rnd(-0.5,0.5);
      p.vy=rnd(-1.5,0.5); p.dec=0.06; particles.push(p);
    }
    if (this.x<-80||this.x>W+80) this.alive=false;
  }
  draw() {
    if (this.crashed) {
      ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.crashAngle);
      if (!this.fromLeft) ctx.scale(-1,1);
      // Original car shape but charred
      ctx.fillStyle='#2a2a2a';
      ctx.beginPath(); rrPath(-this.w/2,-this.h/2,this.w,this.h,4); ctx.fill();
      ctx.fillStyle='rgba(255,60,0,0.35)'; // orange char
      ctx.beginPath(); rrPath(-this.w/2,-this.h/2,this.w,this.h,4); ctx.fill();
      // Roof
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.beginPath(); rrPath(-this.w/2+7,-this.h/2,this.w-14,this.h*0.72,3); ctx.fill();
      // Broken windshield
      ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(this.w/2-15,-this.h/2+2); ctx.lineTo(this.w/2-5,this.h/2-2); ctx.stroke();
      // Wheels (still there)
      ctx.fillStyle='#111';
      for(const [wx,wy] of [[-this.w/2+6,-this.h/2-2],[this.w/2-6,-this.h/2-2],
                             [-this.w/2+6,this.h/2+1],[this.w/2-6,this.h/2+1]]){
        ctx.beginPath(); ctx.arc(wx,wy,4.5,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
      // Fire above (in screen space so it's always visible)
      ctx.font='12px sans-serif'; ctx.textAlign='center';
      ctx.fillText('🔥',this.x,this.y-this.h/2-4);
      return;
    }
    ctx.save();
    ctx.translate(this.x,this.y);
    if (!this.fromLeft) ctx.scale(-1,1);
    ctx.shadowBlur=8; ctx.shadowColor='rgba(0,0,0,0.5)';
    // Body
    ctx.fillStyle=this.col;
    ctx.beginPath(); rrPath(-this.w/2,-this.h/2,this.w,this.h,4); ctx.fill();
    // Roof
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath(); rrPath(-this.w/2+7,-this.h/2,this.w-14,this.h*0.72,3); ctx.fill();
    ctx.shadowBlur=0;
    // Windshield
    ctx.fillStyle='rgba(173,216,230,0.55)';
    ctx.beginPath(); rrPath(this.w/2-15,-this.h/2+2,11,this.h*0.62,2); ctx.fill();
    // Wheels
    ctx.fillStyle='#111';
    for(const [wx,wy] of [[-this.w/2+6,-this.h/2-2],[this.w/2-6,-this.h/2-2],
                           [-this.w/2+6,this.h/2+1],[this.w/2-6,this.h/2+1]]){
      ctx.beginPath(); ctx.arc(wx,wy,4.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

// ── POLICE ─────────────────────────────────────────────────
// Patrols the far sidewalk in stage 3.
// While gulls are within radio radius: timer drains at 1.5× speed,
// HUD timer turns orange.
// Overwhelm with 20+ gulls: police flees, +10s bonus.
class Police {
  constructor() {
    const fromRight = Math.random()<0.5;
    this.x = fromRight ? W+20 : -20;
    this.y = rnd(H_BASE+30, H_STAGE2-40);   // promenade zone
    this.tx = rnd(80,W-80); this.ty = rnd(H_BASE+30, H_STAGE2-40);
    this.spd = rnd(0.7,1.1);
    this.wt  = 0;
    this.r   = 88;
    this.radioing     = false;
    this.overwhelmed  = false;
    this.alive        = true;
  }
  update() {
    if (!this.overwhelmed) {
      // Wander in promenade zone
      this.wt--;
      if (this.wt<=0) {
        this.wt=rnd(90,200)|0;
        this.tx=rnd(60,W-60);
        this.ty=rnd(H_BASE+30, H_STAGE2-40);
      }
      const dx=this.tx-this.x, dy=this.ty-this.y, dd=Math.hypot(dx,dy);
      if (dd>3) { this.x+=(dx/dd)*this.spd; this.y+=(dy/dd)*this.spd; }
      this.x=clamp(this.x,18,W-18);
      this.y=clamp(this.y,H_BASE+25,H_STAGE2-35);
    } else {
      // Overwhelmed: flee straight to exit, don't wander
      const dx=this.tx-this.x, dy=this.ty-this.y, dd=Math.hypot(dx,dy)+0.001;
      this.x+=(dx/dd)*this.spd; this.y+=(dy/dd)*this.spd;
      if(this.x<-65||this.x>W+65||this.y<-65||this.y>H+65) this.alive=false;
      return;
    }

    // Count nearby airborne gulls
    let nearbyGulls=0;
    for(const g of gulls){
      if(!g.airborne) continue;
      if(Math.hypot(g.x-this.x,g.y-this.y)<this.r) nearbyGulls++;
    }
    this.radioing = nearbyGulls>0 && !this.overwhelmed;

    if (nearbyGulls>=20) {
      this.overwhelmed=true; this.radioing=false; this.spd=3.2;
      this.tx = this.x<W/2 ? -100 : W+100; this.ty=this.y;
      const policeGain=30*scoreMultiplier;
      score+=policeGain; growthMeter+=20;
      scorePopup(this.x, this.y, policeGain, '#fd79a8');
      runPoliceOverwhelmed++;
      if(runPoliceOverwhelmed>=15) unlockAch('deflock');
    }
  }
  draw() {
    ctx.save(); ctx.translate(this.x,this.y);

    if (this.radioing) {
      // Pulsing red radius
      const pulse=0.07+Math.abs(Math.sin(frame*0.14))*0.07;
      ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,50,50,${pulse})`; ctx.fill();
      ctx.strokeStyle='rgba(255,60,60,0.35)'; ctx.lineWidth=1.5; ctx.stroke();
    }
    // Officer body
    ctx.fillStyle='#1565C0';
    ctx.beginPath(); ctx.ellipse(0,0,7,10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f5cba7';
    ctx.beginPath(); ctx.arc(0,-13,6,0,Math.PI*2); ctx.fill();
    // Cap
    ctx.fillStyle='#0d47a1';
    ctx.beginPath(); ctx.arc(0,-17,6,Math.PI,Math.PI*2); ctx.fill();
    ctx.fillRect(-8,-17,16,3);
    // Radio emoji when radioing
    if (this.radioing) {
      ctx.font='14px sans-serif'; ctx.textAlign='center';
      ctx.fillText('📻',14,-4);
    }
    ctx.restore();
  }
}

// ── NEWS VAN ───────────────────────────────────────────────
// Spawns rarely on the far sidewalk at stage 3. Auto-despawns after ~10s.
// Swarm with 5+ gulls → 2× multiplier + golden screen aura. Can respawn.
class NewsVan {
  constructor() {
    this.x    = rnd(100, W-100);
    this.y    = H_STAGE3 - 55;
    this.t    = 0;
    this.life = rnd(480, 720);  // ~8–12s before auto-despawn
    this.activated = false;
    this.fleeing   = false;
    this.vy        = 0;
    this.alive     = true;
  }
  update() {
    this.t += 0.06;
    // After activation: drive off the bottom of the screen
    if (this.fleeing) {
      this.vy = Math.min(this.vy + 0.25, 6);
      this.y += this.vy;
      if (this.y > H+90) this.alive = false;
      return;
    }
    // Auto-despawn when time runs out (fades in last 120 frames)
    this.life--;
    if (this.life <= 0) { this.alive = false; return; }

    let nearbyGulls=0;
    for (const g of gulls) {
      if (!g.airborne) continue;
      if (Math.hypot(g.x-this.x,g.y-this.y)<55) nearbyGulls++;
    }
    if (nearbyGulls>=5) {
      this.activated=true; this.fleeing=true;
      scoreMultiplier=2; multiplierTimer=1800; goldFlash=0.6;
      const vanGain=80*scoreMultiplier; score+=vanGain; growthMeter+=40;
      scorePopup(this.x, this.y-30, vanGain, '#ffd700');
      playNewsJingle();
      runNewsVans++;
      if(runNewsVans>=3) unlockAch('news_van');
      for(let i=0;i<5;i++){
        const p=new Particle(this.x+rnd(-20,20),this.y+rnd(-14,14),2);
        p.text=['📺','⭐','LIVE!'][Math.floor(rnd(0,3))];
        p.col='#ffd700'; p.sz=rnd(12,18); p.dec=0.008; particles.push(p);
      }
    }
  }
  draw() {
    const fadeAlpha = (!this.activated && this.life<120) ? this.life/120 : 1;
    ctx.save(); ctx.globalAlpha=fadeAlpha; ctx.translate(this.x,this.y);
    if (this.activated) { ctx.shadowBlur=18; ctx.shadowColor='#ffd700'; }
    ctx.fillStyle='#f5f5f5';
    ctx.beginPath(); rrPath(-30,-16,60,32,5); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#c0392b'; ctx.fillRect(-30,-16,60,11);
    ctx.fillStyle='#fff'; ctx.font='bold 7px Nunito'; ctx.textAlign='center';
    ctx.fillText('CHANNEL 7 NEWS',0,-8);
    ctx.strokeStyle='#777'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(10,-16); ctx.lineTo(10,-28); ctx.stroke();
    ctx.beginPath(); ctx.arc(10,-33,6,Math.PI*0.7,Math.PI*2.3); ctx.stroke();
    ctx.fillStyle='#222';
    for(const wx of [-18,18]){ ctx.beginPath(); ctx.arc(wx,16,5,0,Math.PI*2); ctx.fill(); }
    ctx.font='11px sans-serif'; ctx.fillText('📺',0,4);
    if (!this.activated && this.life<180) {
      // Fading warning — blink as it's about to leave
      if(Math.sin(this.t*12)>0){
        ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='bold 7px Nunito';
        ctx.fillText('LEAVING SOON',0,-22);
      }
    }
    if (this.activated) {
      const blink=Math.sin(this.t*10)>0;
      ctx.fillStyle=blink?'#e74c3c':'#c0392b';
      ctx.font='bold 8px Nunito'; ctx.textAlign='center';
      ctx.fillText('● LIVE',0,-20);
    }
    ctx.restore();
  }
}

// ── SCORE POPUP ────────────────────────────────────────────
// Floats a score label above a position then fades out.
function scorePopup(x, y, amount, col='#ffeaa7') {
  const p = new Particle(x, y-30, 1);
  p.text = '+'+Math.floor(amount);
  p.col  = col; p.sz = 20;      // bigger than before
  p.vx   = 0;   p.vy = -1.0; p.dec = 0.009;  // slower fade, ~110 frames
  particles.push(p);
}

// ── BOAT ───────────────────────────────────────────────────
// Large drifting target in harbor zone. Needs 20+ gulls to start sinking.
// Sinks slowly over ~8s, releasing a chip charge when half-sunk.
class Boat {
  constructor() {
    this.x   = rnd(100,W-100);
    this.y   = H_STAGE3+42 + rnd(0,25);
    this.vx  = rnd(-0.25,0.25);
    this.w   = 72; this.h = 28;
    this.sinking     = false;
    this.sinkProgress= 0;
    this.damage      = 0;      // persistent 0–100, never resets
    this.scored      = false;
    this.nearbyGulls = 0;
    this.alive       = true;
    this.t           = 0;
    this.col         = ['#8d6e63','#5d4037','#6d4c41'][Math.floor(rnd(0,3))];
  }
  update() {
    this.t++;
    this.x += this.vx;
    if(this.x<50) this.vx=Math.abs(this.vx);
    if(this.x>W-50) this.vx=-Math.abs(this.vx);

    if (this.sinking) {
      this.sinkProgress = Math.min(1, this.sinkProgress+0.0018);
      this.y += 0.55;
      if (!this.scored && this.sinkProgress>0.35) {
        this.scored=true;
        const gained=500*scoreMultiplier;
        score+=gained; growthMeter+=60;
        chipCharges=Math.min(CHIP_MAX,chipCharges+1);
        scorePopup(this.x, this.y-30, gained, '#74b9ff');
        playBoatSink(); playChipEarned();
        runBoatsSunk++;
        if(runBoatsSunk>=5) unlockAch('boat_sinker');
        for(let i=0;i<8;i++){
          const p=new Particle(this.x+rnd(-30,30),this.y+rnd(-12,12),2);
          p.text=['~','·','*'][Math.floor(rnd(0,3))];
          p.col='#74b9ff'; p.sz=rnd(11,17); p.dec=0.01; particles.push(p);
        }
      }
      if(this.sinkProgress>=1) this.alive=false;
      return;
    }

    // Only check gulls that are actually in the harbor zone (cheap y-gate)
    let nearbyGulls=0;
    for (const g of gulls) {
      if (!g.airborne || g.y<H_STAGE3+20) continue;
      if (Math.hypot(g.x-this.x,g.y-this.y)<70) nearbyGulls++;
    }
    this.nearbyGulls=nearbyGulls;
    // Damage accumulates when gulls are present, never resets
    if (nearbyGulls>0) {
      const rate = nearbyGulls>=10?0.44 : nearbyGulls>=5?0.28 : 0.16;  // ~57% faster
      this.damage = Math.min(100, this.damage + rate);
      const mult=nearbyGulls>=10?2.5:nearbyGulls>=5?1.5:1.0;
      score+=0.08*mult*scoreMultiplier; growthMeter+=0.04*mult;
    }
    if (this.damage>=100 && !this.sinking) { this.sinking=true; }
  }
  draw() {
    const sinkY = this.sinking ? this.sinkProgress*20 : 0;
    const alpha = this.sinking ? 1-this.sinkProgress*0.65 : 1;
    const tilt  = this.sinking ? this.sinkProgress*0.55 : 0; // strong tilt during sinking
    ctx.save(); ctx.globalAlpha=alpha; ctx.translate(this.x, this.y+sinkY);
    ctx.rotate(tilt);

    // Hull
    ctx.fillStyle=this.col;
    ctx.beginPath();
    ctx.moveTo(-this.w/2,2); ctx.lineTo(-this.w/2+8,this.h);
    ctx.lineTo(this.w/2-8,this.h); ctx.lineTo(this.w/2,2); ctx.closePath(); ctx.fill();
    // Deck
    ctx.fillStyle='#a1887f'; ctx.fillRect(-this.w/2+4,-6,this.w-8,10);
    // Cabin
    ctx.fillStyle='#eceff1';
    ctx.beginPath(); rrPath(-14,-22,28,18,3); ctx.fill();
    ctx.fillStyle='rgba(100,200,255,0.5)';
    ctx.beginPath(); rrPath(-10,-20,9,8,2); ctx.fill();
    ctx.beginPath(); rrPath(1,-20,9,8,2); ctx.fill();
    // Mast
    ctx.strokeStyle='#4e342e'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(0,-36); ctx.stroke();
    if (!this.sinking) {
      ctx.fillStyle='#e74c3c';
      ctx.beginPath(); ctx.moveTo(0,-36); ctx.lineTo(13,-30); ctx.lineTo(0,-24); ctx.closePath(); ctx.fill();
    }
    // Fishermen dots
    ctx.fillStyle='#f5cba7';
    for(const fx of [-22,0,22]){ ctx.beginPath(); ctx.arc(fx,-9,3.5,0,Math.PI*2); ctx.fill(); }
    // Water rising when sinking
    if (this.sinking) {
      ctx.fillStyle=`rgba(26,83,118,${this.sinkProgress*0.55})`;
      ctx.fillRect(-this.w/2+4,-6+this.sinkProgress*22,this.w-8,10);
    }

    // Damage bar — always visible once any damage taken, fills red as boat takes hits
    if (!this.sinking && this.damage>0) {
      const pct=this.damage/100;
      ctx.save(); ctx.rotate(-tilt);
      fillRR(-26,this.h+4,52,6,2,'rgba(0,0,0,0.45)');
      const barCol=pct>0.7?'#e74c3c':pct>0.4?'#f39c12':'#74b9ff';
      fillRR(-26,this.h+4,52*pct,6,2,barCol);
      ctx.restore();
    }
    ctx.restore();
  }
}

// ── SHARK ───────────────────────────────────────────────────
// Fixed: only scans harbor-zone gulls (y > H_STAGE3+45), no emoji splash,
// fin draws in world-up space regardless of movement direction.
class Shark {
  constructor() {
    this.x  = rnd(50,W-50);
    this.y  = rnd(H_STAGE3+80, H_STAGE4-60);
    this.tx = rnd(50,W-50); this.ty=rnd(H_STAGE3+80,H_STAGE4-60);
    this.spd=rnd(1.0,1.8); this.wt=0; this.alive=true; this.t=0;
  }
  update() {
    this.t++;
    this.wt--;
    if(this.wt<=0){
      this.wt=rnd(120,260)|0;
      this.tx=rnd(50,W-50); this.ty=rnd(H_STAGE3+80,H_STAGE4-60);
    }
    const dx=this.tx-this.x,dy=this.ty-this.y,dd=Math.hypot(dx,dy)+0.001;
    if(dd>3){this.x+=(dx/dd)*this.spd;this.y+=(dy/dd)*this.spd;}
    this.x=clamp(this.x,30,W-30);
    this.y=clamp(this.y,H_STAGE3+65,H_STAGE4-45);

    // Only scan gulls in water zone — cheap y-gate before expensive hypot
    for(let i=gulls.length-1;i>=0;i--){
      const g=gulls[i];
      if (g.y < H_STAGE3+45) continue;  // not in water, skip
      if (Math.hypot(g.x-this.x,g.y-this.y)<42){
        gulls.splice(i,1);
        statGullsKilled++;
        // Simple splash — no emoji
        for(let j=0;j<2;j++){
          const p=new Particle(this.x+rnd(-10,10),this.y+rnd(-6,6),1);
          p.text='~'; p.col='#74b9ff';
          p.sz=rnd(11,15); p.vx=rnd(-1.5,1.5); p.vy=rnd(-1.5,0.3); p.dec=0.035;
          particles.push(p);
        }
        break;
      }
    }
  }
  draw() {
    ctx.save(); ctx.translate(this.x,this.y);
    const ang=Math.atan2(this.ty-this.y,this.tx-this.x);
    // Body ellipse rotates with direction
    ctx.save(); ctx.rotate(ang);
    ctx.fillStyle='rgba(20,45,80,0.28)';
    ctx.beginPath(); ctx.ellipse(0,4,26,9,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Fin sweeps BACK from direction of travel — hypotenuse faces forward.
    // Leading edge is steep, trailing edge is swept like a real dorsal fin.
    const movingRight = Math.cos(ang)>=0;
    const sx = movingRight ? 1 : -1; // mirror for left travel

    // Draw fin in world-up space (always points skyward), mirrored for direction
    ctx.save(); ctx.scale(sx,1);
    // Fin shape: right angle at base-right, tip at top-left, swept trailing edge
    ctx.fillStyle='#e8ecf0';  // light grey — clearly visible against dark water
    ctx.beginPath();
    ctx.moveTo(-8, 2);         // base left
    ctx.lineTo( 9, 2);         // base right (right angle here)
    ctx.lineTo(-8,-22);        // tip (swept back from direction of travel)
    ctx.closePath(); ctx.fill();
    // Slight shadow shading on the leading face
    ctx.fillStyle='rgba(100,130,180,0.35)';
    ctx.beginPath();
    ctx.moveTo(-8,2); ctx.lineTo(9,2); ctx.lineTo(-8,-22); ctx.closePath(); ctx.fill();
    // Organic trailing-edge curve hint
    ctx.strokeStyle='rgba(180,200,220,0.6)'; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(-8,2); ctx.quadraticCurveTo(-4,-8,-8,-22); ctx.stroke();
    ctx.restore();

    // Water surface line — fin emerges from here
    ctx.strokeStyle='rgba(100,180,255,0.45)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-12,2); ctx.lineTo(12,2); ctx.stroke();

    ctx.restore();
  }
}

// ── HELICOPTER ─────────────────────────────────────────────
// Boss unit. Spawns once at HELICOPTER_FLOCK gulls.
// Chases flock center. Rotor zone scatters gulls.
// Tail rotor = weak point: sustained gull contact causes tail failure → spiral crash → +1000 pts.
class Helicopter {
  constructor() {
    this.x=W/2+rnd(-80,80); this.y=-80;
    this.vx=0; this.vy=1.5;
    this.maxSpd=DIFF[difficulty].heliSpd;
    this.rotorAngle=0;
    this.facing=Math.PI/2;
    this.smoothFacing=Math.PI/2; // lerped facing for drawing — prevents snappy rotation
    this.tailHits=0;
    this.tailBroken=false;
    this.spiralAngle=0; this.spiralSpeed=0;
    this.crashTimer=0;
    this.crashed=false; this.wreckLife=0;
    this.alive=true;
  }
  update() {
    if (this.crashed) {
      return;  // permanent wreck, no smoke
    }

    this.rotorAngle += this.tailBroken ? 0.08+this.spiralSpeed*0.5 : 0.22;

    if (this.tailBroken) {
      this.spiralSpeed=Math.min(this.spiralSpeed+0.004, 0.28);
      this.spiralAngle+=0.05+this.spiralSpeed;
      // Bouncing chaotic motion — vx oscillates, vy accelerates, bounces off walls
      this.bounceVx = (this.bounceVx||rnd(-3,3));
      this.bounceVy = (this.bounceVy||(-2));
      this.bounceVy += 0.08;
      this.x += this.bounceVx;
      this.y += this.bounceVy;
      // Bounce off screen sides
      if(this.x<40){this.x=40;this.bounceVx=Math.abs(this.bounceVx)*0.8;}
      if(this.x>W-40){this.x=W-40;this.bounceVx=-Math.abs(this.bounceVx)*0.8;}
      // Clamp and count
      this.crashTimer++;
      // Crash once it hits the ground zone or after ~4 seconds
      if (this.crashTimer>240 || this.y>H_BASE-30) {
        this.y=clamp(this.y,0,H_BASE-30); // land on beach/promenade, not off-screen
        this.crashed=true;
        const heliGain=5000*scoreMultiplier;
        score+=heliGain; growthMeter+=100;
        scorePopup(this.x, this.y-45, heliGain, '#ffd700');
        playHeliCrash();
        unlockAch('heli_killer');
        // Big permanent scorch on the ground where it lands
        worldDamage.scorchMarks.push({x:this.x, y:this.y, big:true});
        for(let i=0;i<22;i++){
          const p=new Particle(this.x+rnd(-55,55),this.y+rnd(-40,40),4);
          p.text=['💥','🔥','BOOM','!!!','★'][Math.floor(rnd(0,5))];
          p.col='#e17055'; p.sz=rnd(16,32); p.dec=0.004; particles.push(p);
        }
        goldFlash=0.9; return;
      }
    } else {
      // Track flock center, stay in beach/promenade zone
      if(gulls.length>0){
        let cx=0,cy=0;
        for(const g of gulls){cx+=g.x;cy+=g.y;}
        cx/=gulls.length; cy/=gulls.length;
        // Only target gulls in beach zone
        cy=clamp(cy,50,H_STAGE2-50);
        const dx=cx-this.x,dy=cy-this.y,dd=Math.hypot(dx,dy)+0.001;
        this.vx+=(dx/dd)*0.07; this.vy+=(dy/dd)*0.07;
        const spd=Math.hypot(this.vx,this.vy);
        if(spd>this.maxSpd){this.vx*=this.maxSpd/spd;this.vy*=this.maxSpd/spd;}
      }
      // Soft boundary: stay in beach/promenade
      if(this.x<60)  this.vx+=0.18; if(this.x>W-60) this.vx-=0.18;
      if(this.y<55)  this.vy+=0.18; if(this.y>H_STAGE2-55) this.vy-=0.18;
    }

    this.x+=this.vx; this.y+=this.vy;
    this.facing=Math.atan2(this.vy,this.vx);
    // Smooth facing — lerp toward real angle to avoid snappy rotation
    let df=this.facing-this.smoothFacing;
    while(df>Math.PI)df-=Math.PI*2; while(df<-Math.PI)df+=Math.PI*2;
    this.smoothFacing+=df*0.06;  // 6% per frame — slow smooth turn

    // Rotor zone: scatter gulls within 55px, spawn feather on kill
    let kills=0;
    for(let i=gulls.length-1;i>=0&&kills<10;i--){
      const g=gulls[i];
      if(!g.airborne) continue;
      const d=Math.hypot(g.x-this.x,g.y-this.y);
      if(d<52){
        if(Math.random()<0.15){
          gulls.splice(i,1); kills++;
          statGullsKilled++;
          playDeathSquawk();
          if(Math.random()<0.7){
            const p=new Particle(g.x+rnd(-6,6),g.y+rnd(-4,4),1);
            p.text='🪶'; p.col='#e0e0e0';
            p.vx=rnd(-3,3); p.vy=rnd(-3,-0.5); p.dec=0.05; particles.push(p);
          }
        } else {
          const ang2=Math.atan2(g.y-this.y,g.x-this.x);
          g.vx+=Math.cos(ang2)*4; g.vy+=Math.sin(ang2)*4;
          g.settleTimer=220; kills++;
        }
      }
    }

    // Tail rotor damage — tail is 68px behind (longer boom)
    if (!this.tailBroken) {
      const tailAng=this.smoothFacing+Math.PI;
      const tailX=this.x+Math.cos(tailAng)*68;
      const tailY=this.y+Math.sin(tailAng)*68;
      let tailGulls=0;
      for(const g of gulls){
        if(g.airborne && Math.hypot(g.x-tailX,g.y-tailY)<30) tailGulls++;
      }
      this.tailHits+=tailGulls;
      if(tailGulls>0&&Math.random()<0.05){
        const p=new Particle(tailX,tailY-15,1);
        p.text='💥'; p.col='#e74c3c'; p.sz=12; p.vx=rnd(-1,1); p.vy=-1.5; p.dec=0.03;
        particles.push(p);
      }
      if(this.tailHits>1400){  // increased durability
        this.tailBroken=true; this.spiralAngle=this.smoothFacing;
        this.bounceVx=rnd(-3,3); this.bounceVy=-2; this.bounces=0;
        const p=new Particle(tailX,tailY-20,3);
        p.text='TAIL ROTOR HIT!'; p.col='#ff4757'; p.sz=16; p.vx=0; p.vy=-1.5; p.dec=0.007;
        particles.push(p);
      }
    }
  }

  draw() {
    if (this.crashed) {
      // Draw in world space directly — no outer save/translate to mismatch
      const ang = this.wreckAngle || (this.wreckAngle = rnd(-0.4,0.4));
      ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(ang);
      ctx.fillStyle='#1a1a1a';
      ctx.beginPath(); rrPath(-22,-10,44,20,4); ctx.fill();
      ctx.fillStyle='rgba(255,70,0,0.5)';
      ctx.beginPath(); rrPath(-22,-10,44,20,4); ctx.fill();
      ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(-4,0); ctx.quadraticCurveTo(-38,8,-58,3); ctx.stroke();
      ctx.fillStyle='rgba(80,150,200,0.25)';
      ctx.beginPath(); ctx.arc(10,0,8,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(6,-5); ctx.lineTo(14,5); ctx.stroke();
      ctx.strokeStyle='#333'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(42,8); ctx.stroke();
      ctx.strokeStyle='#444'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-15,14); ctx.lineTo(12,16); ctx.stroke();
      ctx.restore();
      // Fire emoji in screen space
      ctx.save(); ctx.globalAlpha=0.8;
      ctx.font='16px sans-serif'; ctx.textAlign='center';
      ctx.fillText('🔥',this.x,this.y-16);
      ctx.restore();
      return;
    }

    ctx.save(); ctx.translate(this.x,this.y);

    ctx.rotate(this.smoothFacing);  // smooth, not snappy

    // Rotor disc
    const rotorOpacity=0.18+Math.abs(Math.sin(this.rotorAngle*4))*0.08;
    ctx.beginPath(); ctx.arc(0,0,50,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,200,200,${rotorOpacity})`; ctx.fill();

    // Spinning rotor blades
    ctx.strokeStyle='rgba(60,60,60,0.75)'; ctx.lineWidth=3;
    for(let i=0;i<2;i++){
      const a=this.rotorAngle+i*Math.PI;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*48,Math.sin(a)*48);
      ctx.lineTo(-Math.cos(a)*48,-Math.sin(a)*48);
      ctx.stroke();
    }

    // Tail boom — longer (68px)
    ctx.strokeStyle='#2d3436'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(-4,0); ctx.lineTo(-68,0); ctx.stroke();

    // Fuselage
    ctx.fillStyle=this.tailBroken?'#7f1d1d':'#2d3436';
    ctx.shadowBlur=8; ctx.shadowColor='rgba(0,0,0,0.4)';
    ctx.beginPath(); rrPath(-18,-11,38,22,5); ctx.fill();
    ctx.shadowBlur=0;

    // Cockpit glazing
    ctx.fillStyle='rgba(100,200,255,0.45)';
    ctx.beginPath(); ctx.arc(12,0,9,0,Math.PI*2); ctx.fill();

    // Skids
    ctx.strokeStyle='#555'; ctx.lineWidth=1.5;
    for(const sy of [-10,10]){
      ctx.beginPath(); ctx.moveTo(-15,sy+12); ctx.lineTo(15,sy+12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-8,sy); ctx.lineTo(-8,sy+12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8,sy); ctx.lineTo(8,sy+12); ctx.stroke();
    }

    // Tail rotor at -68
    const trCol=this.tailBroken?'#ff4757':'#555';
    ctx.strokeStyle=trCol; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-68,-8); ctx.lineTo(-68,8); ctx.stroke();

    // Red target ring on tail — visible instruction for weak point
    if (!this.tailBroken) {
      const pulse=0.5+Math.abs(Math.sin(this.rotorAngle*3))*0.5;
      ctx.strokeStyle=`rgba(255,50,50,${0.55+pulse*0.35})`; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.arc(-68,0,14,0,Math.PI*2); ctx.stroke();
      // Inner crosshair dot
      ctx.fillStyle=`rgba(255,50,50,${0.6+pulse*0.3})`;
      ctx.beginPath(); ctx.arc(-68,0,3,0,Math.PI*2); ctx.fill();
    } else {
      ctx.shadowBlur=12; ctx.shadowColor='#ff4757';
      ctx.strokeStyle='#ff4757'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-68,-8); ctx.lineTo(-68,8); ctx.stroke();
      ctx.shadowBlur=0;
    }

    // Tail damage progress bar
    if(!this.tailBroken && this.tailHits>0){
      const pct=Math.min(1,this.tailHits/1400);
      ctx.save(); ctx.rotate(-this.smoothFacing);
      fillRR(-20,-32,40,5,2,'rgba(0,0,0,0.5)');
      fillRR(-20,-32,40*pct,5,2,`rgba(255,${Math.floor(200*(1-pct))},0,0.9)`);
      ctx.restore();
    }

    ctx.restore();

    // Warning label (in screen space)
    if(!this.crashed){
      ctx.fillStyle=this.tailBroken?'#ff4757':'rgba(255,60,60,0.85)';
      ctx.font='bold 9px Nunito'; ctx.textAlign='center';
      ctx.fillText(this.tailBroken?'🚁 SPINNING OUT!':'🚁 HELICOPTER!',
                   this.x, this.y-(this.tailBroken?38:30));
    }
  }
}

// ── BACKGROUND ─────────────────────────────────────────────
function drawBackground() {
  // ── Ocean (always) ──────────────────────────────────────
  const og=ctx.createLinearGradient(0,0,0,95);
  og.addColorStop(0,'#1a6fa8'); og.addColorStop(1,'#4a9fd4');
  ctx.fillStyle=og; ctx.fillRect(0,0,W,95);
  for(let w=0;w<3;w++){
    ctx.strokeStyle=`rgba(255,255,255,${0.12+w*0.07})`; ctx.lineWidth=1.8;
    ctx.beginPath();
    for(let x=0;x<=W;x+=8){
      const y=48+w*16+Math.sin(x*0.025+frame*0.04+w*1.2)*6;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // ── Sand (always fixed 95..H_BASE-45) ───────────────────
  const sg=ctx.createLinearGradient(0,95,0,H_BASE-45);
  sg.addColorStop(0,'#f2c64a'); sg.addColorStop(1,'#e8b838');
  ctx.fillStyle=sg; ctx.fillRect(0,95,W,H_BASE-140);

  for(const t of TOWELS){
    ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(t.r);
    fillRR(-t.w/2,-t.h/2,t.w,t.h,3,t.c);
    ctx.fillStyle='rgba(255,255,255,0.27)';
    for(let s=-t.w/2+5;s<t.w/2;s+=8) ctx.fillRect(s,-t.h/2,3,t.h);
    ctx.restore();
  }
  for(let ui=0; ui<UMBRELLAS.length; ui++){
    const u=UMBRELLAS[ui];
    const knocked=worldDamage.umbrellaDown.includes(ui);
    ctx.save(); ctx.translate(u.x, u.y);
    if (knocked) {
      // Ground shadow — flat ellipse at base, no rotation weirdness
      ctx.fillStyle='rgba(0,0,0,0.15)';
      ctx.beginPath(); ctx.ellipse(20, 28, 38, 8, 0, 0, Math.PI*2); ctx.fill();
      // Pole — lying horizontal to the right
      ctx.strokeStyle='#8B4513'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(0, 26); ctx.lineTo(46, 26); ctx.stroke();
      // Deflated canopy — flattened ellipse where canopy tip would land
      ctx.fillStyle=u.c;
      ctx.beginPath(); ctx.ellipse(46, 22, 22, 8, -0.15, 0, Math.PI*2); ctx.fill();
      // Highlight strip on canopy
      ctx.fillStyle='rgba(255,255,255,0.18)';
      ctx.beginPath(); ctx.ellipse(46, 20, 14, 4, -0.15, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.strokeStyle='#8B4513'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(0,28); ctx.lineTo(0,-3); ctx.stroke();
      ctx.fillStyle=u.c;
      ctx.beginPath(); ctx.arc(0,0,30,Math.PI,Math.PI*2);
      ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.beginPath(); ctx.arc(0,0,30,Math.PI,Math.PI*1.5);
      ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.08)';
      ctx.beginPath(); ctx.ellipse(12,30,25,7,0.15,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // Ice cream stand
  const sx=838,sy=295;
  fillStrokeRR(sx-22,sy-18,44,38,4,'#fff','#ddd',1);
  ctx.fillStyle='#c0392b';
  ctx.beginPath();
  ctx.moveTo(sx-28,sy-18); ctx.lineTo(sx+28,sy-18);
  ctx.lineTo(sx+22,sy-35); ctx.lineTo(sx-22,sy-35);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.32)';
  for(let xs=sx-18;xs<sx+22;xs+=9){
    ctx.beginPath();
    ctx.moveTo(xs,sy-18); ctx.lineTo(xs+4,sy-18); ctx.lineTo(xs,sy-35); ctx.closePath(); ctx.fill();
  }
  ctx.font='18px sans-serif'; ctx.textAlign='center';
  ctx.fillText('🍦',sx,sy+6);

  // ── Stage 2: extended promenade below beach ──────────────
  if (H > H_BASE) {
    const pY = H_BASE - 45;  // promenade starts here

    // Extended concrete — fills from beach border to bottom
    ctx.fillStyle='#9ea8b0'; ctx.fillRect(0, pY, W, H-pY);

    // Subtle concrete texture lines
    ctx.strokeStyle='rgba(0,0,0,0.07)'; ctx.lineWidth=1;
    for(let py=pY+18; py<H; py+=22){
      ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke();
    }

    // Dashed road line in the extended zone
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=2;
    ctx.setLineDash([18,12]);
    ctx.beginPath(); ctx.moveTo(0,H_BASE+50); ctx.lineTo(W,H_BASE+50); ctx.stroke();
    ctx.setLineDash([]);

    // Storefront facades at the bottom of the world
    if (H >= H_STAGE2 - 20) {
      drawStorefronts();
    }
  } else {
    // Stage 1 promenade strip
    ctx.fillStyle='#bfc8cc'; ctx.fillRect(0,H_BASE-45,W,45);
    ctx.strokeStyle='#a8b2b5'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,H_BASE-45); ctx.lineTo(W,H_BASE-45); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=2;
    ctx.setLineDash([18,12]);
    ctx.beginPath(); ctx.moveTo(0,H_BASE-22); ctx.lineTo(W,H_BASE-22); ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Stage 3: road zone below promenade ──────────────────
  if (H > H_STAGE2) {
    const roadTop = H_STAGE2;
    const laneCenter = roadTop+60;
    // Asphalt (draws on top of promenade concrete below the border)
    ctx.fillStyle='#37474f';
    ctx.fillRect(0, roadTop, W, Math.min(H,roadTop+122)-roadTop);
    // Subtle texture
    ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
    for(let py=roadTop+18;py<Math.min(H,roadTop+122);py+=22){
      ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke();
    }
    // Lane markings
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2;
    ctx.setLineDash([22,16]);
    if(H>roadTop+28){ ctx.beginPath(); ctx.moveTo(0,roadTop+28); ctx.lineTo(W,roadTop+28); ctx.stroke(); }
    if(H>roadTop+92){ ctx.beginPath(); ctx.moveTo(0,roadTop+92); ctx.lineTo(W,roadTop+92); ctx.stroke(); }
    // Yellow center
    if(H>laneCenter){ ctx.strokeStyle='rgba(255,215,50,0.65)'; ctx.lineWidth=3; ctx.setLineDash([]); ctx.beginPath(); ctx.moveTo(0,laneCenter); ctx.lineTo(W,laneCenter); ctx.stroke(); }
    ctx.setLineDash([]);

    // Tire tracks from crashed cars
    if(worldDamage.tireTracks.length>0){
      ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=3;
      ctx.setLineDash([8,6]);
      for(const t of worldDamage.tireTracks){
        ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke();
        // Second track ~8px offset
        ctx.beginPath(); ctx.moveTo(t.x1,t.y1+8); ctx.lineTo(t.x2,t.y2+8); ctx.stroke();
      }
      ctx.setLineDash([]);
    }
    // Scorch marks — plain dark ellipses, big for helicopter, small for cars
    for(const s of worldDamage.scorchMarks){
      ctx.fillStyle='rgba(0,0,0,0.32)';
      const rx=s.big?55:28, ry=s.big?22:12;
      ctx.beginPath(); ctx.ellipse(s.x,s.y,rx,ry,0,0,Math.PI*2); ctx.fill();
    }
    // Far sidewalk
    if(H>H_STAGE2+122){
      ctx.fillStyle='#8d9eaa'; ctx.fillRect(0,H_STAGE2+122,W,H-(H_STAGE2+122));
      ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
      for(let py=H_STAGE2+140;py<Math.min(H,H_STAGE3);py+=24){ ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke(); }
      ctx.strokeStyle='rgba(200,200,200,0.45)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,H_STAGE2+122); ctx.lineTo(W,H_STAGE2+122); ctx.stroke();
    }
  }

  // ── Stage 4: harbor / dock ────────────────────────────────
  if (H > H_STAGE3) {
    const wg=ctx.createLinearGradient(0,H_STAGE3,0,H_STAGE4);
    wg.addColorStop(0,'#1a5276'); wg.addColorStop(1,'#0d2b45');
    ctx.fillStyle=wg; ctx.fillRect(0,H_STAGE3,W,H-H_STAGE3);
    // Dock planks
    ctx.fillStyle='#7d6608'; ctx.fillRect(0,H_STAGE3,W,28);
    ctx.strokeStyle='rgba(0,0,0,0.22)'; ctx.lineWidth=1.5;
    for(let px=0;px<W;px+=20){ctx.beginPath();ctx.moveTo(px,H_STAGE3);ctx.lineTo(px,H_STAGE3+28);ctx.stroke();}
    ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,H_STAGE3+14); ctx.lineTo(W,H_STAGE3+14); ctx.stroke();
    // Animated water
    if(H>H_STAGE3+30){
      ctx.strokeStyle='rgba(100,180,255,0.22)'; ctx.lineWidth=1.5;
      for(let w=0;w<3;w++){
        ctx.beginPath();
        for(let x=0;x<=W;x+=10){
          const y=H_STAGE3+38+w*22+Math.sin(x*0.03+frame*0.025+w*1.5)*5;
          x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
    }
    // Dock posts
    ctx.fillStyle='#5d4037';
    for(const px of [80,250,450,650,820]){
      const ph=Math.min(H-H_STAGE3,80);
      if(ph>0){ ctx.fillRect(px-4,H_STAGE3,8,ph); }
    }
  }
}

function drawStorefronts() {
  const y = H_STAGE2 - 65;
  const shops = [
    {x:60,  w:140, col:'#e74c3c', label:'🍕 PIZZA'},
    {x:340, w:160, col:'#2980b9', label:'☕ CAFE'},
    {x:620, w:140, col:'#27ae60', label:'🍦 GELATO'},
  ];
  for (let si=0; si<shops.length; si++) {
    const s = shops[si];
    const onFire = worldDamage.fireShops.includes(si);
    // Awning
    ctx.fillStyle = onFire ? '#7f1d1d' : s.col;
    ctx.beginPath();
    ctx.moveTo(s.x-8, y); ctx.lineTo(s.x+s.w+8, y);
    ctx.lineTo(s.x+s.w, y+18); ctx.lineTo(s.x, y+18);
    ctx.closePath(); ctx.fill();
    // Awning stripes
    ctx.fillStyle='rgba(255,255,255,0.25)';
    for(let xs=s.x; xs<s.x+s.w; xs+=16){
      ctx.beginPath();
      ctx.moveTo(xs,y); ctx.lineTo(xs+8,y); ctx.lineTo(xs+8-6,y+18); ctx.lineTo(xs-6,y+18);
      ctx.closePath(); ctx.fill();
    }
    // Shopfront
    fillRR(s.x, y+18, s.w, 47, 2, onFire ? '#3a2020' : '#f5f5f5');
    ctx.strokeStyle = onFire ? 'rgba(200,80,0,0.4)' : 'rgba(0,0,0,0.15)';
    ctx.lineWidth=1;
    ctx.beginPath(); rrPath(s.x,y+18,s.w,47,2); ctx.stroke();
    // Window — cracked or normal
    const hasCrack = worldDamage.crackPositions.some(c=>Math.abs(c.x-(s.x+s.w/2))<80);
    if (hasCrack || onFire) {
      ctx.fillStyle='rgba(100,130,150,0.25)';
      fillRR(s.x+12, y+24, s.w-24, 26, 3, 'rgba(80,100,120,0.2)');
      // Spider crack lines
      ctx.strokeStyle='rgba(200,210,220,0.65)'; ctx.lineWidth=1;
      const cx=s.x+s.w/2, cy=y+37;
      for(let a=0;a<6;a++){
        const ang=a*Math.PI/3+0.3;
        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.lineTo(cx+Math.cos(ang)*14, cy+Math.sin(ang)*10);
        ctx.stroke();
      }
    } else {
      fillRR(s.x+12, y+24, s.w-24, 26, 3, 'rgba(173,216,230,0.55)');
    }
    // Label
    ctx.fillStyle = onFire ? '#ff6b6b' : '#333';
    ctx.font='bold 11px Nunito'; ctx.textAlign='center';
    ctx.fillText(s.label, s.x+s.w/2, y+56);
    // Outdoor table
    const tx=s.x+s.w/2, ty2=y-18;
    ctx.fillStyle='#795548';
    ctx.beginPath(); ctx.ellipse(tx, ty2, 18, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.ellipse(tx, ty2, 14, 5, 0, 0, Math.PI*2); ctx.fill();
    for(const cx2 of [tx-22, tx+22]){
      ctx.fillStyle='#a1887f';
      ctx.beginPath(); ctx.ellipse(cx2, ty2, 7, 4, 0, 0, Math.PI*2); ctx.fill();
    }
    // Fire overlay — no smoke particles (performance)
    if (onFire) {
      ctx.font='18px sans-serif'; ctx.textAlign='center';
      ctx.fillText('🔥', s.x+s.w/2, y+8);
    }
  }
}

// ── HUD ─────────────────────────────────────────────────────
// Layout: one panel, split into rows
//  Row 1:  [🦅 FLOCK]   [CHAOS SCORE]   [TIME]    ← big readable numbers
//  divider
//  Row 2:  [NEW GULL meter]  |  [🍟 CHIPS pips]   ← compact meters
function drawHUD() {
  fillRR(8,8,W-16,77,8,'rgba(0,0,0,0.52)');

  // ── Row 1: three columns ──────────────────────────────
  // Flock (left)
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='700 11px Nunito'; ctx.textAlign='left';
  ctx.fillText('🦅 FLOCK',20,28);
  ctx.fillStyle='#74b9ff'; ctx.font='30px Bangers';
  ctx.fillText(gulls.length,20,55);

  // Chaos Score (centre)
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='700 11px Nunito'; ctx.textAlign='center';
  ctx.fillText('CHAOS SCORE',W/2,28);
  ctx.fillStyle='#fd79a8'; ctx.font='30px Bangers';
  const scoreX = scoreMultiplier>1 ? W/2-16 : W/2;
  ctx.fillText(Math.floor(score),scoreX,55);
  if(scoreMultiplier>1){
    ctx.shadowBlur=8; ctx.shadowColor='#ffd700';
    ctx.fillStyle='#ffd700'; ctx.font='18px Bangers';
    ctx.fillText('×2',W/2+32,55);
    ctx.shadowBlur=0;
  }

  // Timer (right) — turns orange when police is radioing in
  const timerDraining = policeRadioActive;
  const timerCol = gameTimer<=15 ? '#ff4757' : timerDraining ? '#fd9644' : 'rgba(255,255,255,0.6)';
  const timerNumCol = gameTimer<=15 ? '#ff4757' : timerDraining ? '#fd9644' : '#fff';
  ctx.fillStyle=timerCol; ctx.font='700 11px Nunito'; ctx.textAlign='right';
  ctx.fillText(timerDraining ? '⚠ TIME' : 'TIME', W-20,28);
  ctx.fillStyle=timerNumCol; ctx.font='30px Bangers';
  ctx.fillText(gameTimer+'s',W-20,55);

  // Divider between rows
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(18,59); ctx.lineTo(W-18,59); ctx.stroke();

  // ── Row 2: growth meter (left) + chips (right) ────────
  const MID = W/2;

  // NEW GULL meter (left half)
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='700 9px Nunito'; ctx.textAlign='left';
  ctx.fillText('NEW GULL',20,73);
  const mX=100, mY=63, mW=MID-115, mH=11;
  fillRR(mX,mY,mW,mH,4,'rgba(255,255,255,0.12)');
  const pct=Math.min(growthMeter/CHAOS_PER_GULL,1);
  if(pct>0){
    const g=ctx.createLinearGradient(mX,0,mX+mW,0);
    g.addColorStop(0,'#fdcb6e'); g.addColorStop(1,'#e17055');
    fillRR(mX,mY,mW*pct,mH,4,g);
  }

  // Vertical divider
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(MID,60); ctx.lineTo(MID,80); ctx.stroke();

  // CHIPS (right half) — label then pips
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='700 9px Nunito'; ctx.textAlign='left';
  ctx.fillText('🍟 CHIPS',MID+12,73);

  // Pip area right-aligned in right half
  const pipW=20, pipGap=4, totalPips=CHIP_MAX*pipW+(CHIP_MAX-1)*pipGap; // 68px
  const pipX = W-20-totalPips; // start of first pip
  for(let i=0;i<CHIP_MAX;i++){
    const charged=i<chipCharges;
    if(charged){ctx.shadowBlur=7; ctx.shadowColor='#fdcb6e';}
    fillRR(pipX+i*(pipW+pipGap),62,pipW,12,3, charged?'#fdcb6e':'rgba(255,255,255,0.12)');
    ctx.shadowBlur=0;
  }
  // Recharge sliver under pips
  if(chipCharges<CHIP_MAX){
    const frac=(CHIP_RECHARGE-chipTimer)/CHIP_RECHARGE;
    fillRR(pipX,76,totalPips,3,1,'rgba(255,255,255,0.1)');
    fillRR(pipX,76,totalPips*frac,3,1,'#fdcb6e');
  }

  // New gull flash
  if(newGullFlash>0){
    ctx.save();
    ctx.globalAlpha=Math.min(1,newGullFlash/30);
    ctx.shadowBlur=14; ctx.shadowColor='#fdcb6e';
    ctx.fillStyle='#ffeaa7'; ctx.font='700 20px Nunito'; ctx.textAlign='center';
    ctx.fillText('+1 GULL!',W/2,103);
    ctx.restore();
    newGullFlash--;
  }

  // Time bonus flash
  if(timeBonusFlash>0){
    ctx.save();
    ctx.globalAlpha=Math.min(1,timeBonusFlash/25)*Math.min(1,(timeBonusFlash/100)*2);
    ctx.shadowBlur=14; ctx.shadowColor='#00b894';
    ctx.fillStyle='#55efc4'; ctx.font='700 20px Nunito'; ctx.textAlign='center';
    ctx.fillText(`⏱ +${DIFF[difficulty].timeBonus} SECONDS!`, W/2, newGullFlash>0 ? 127 : 103);
    ctx.restore();
    timeBonusFlash--;
  }

  // Stage unlock banner
  if(stageUnlockBanner>0){
    const alpha=Math.min(1,stageUnlockBanner/40)*Math.min(1,(stageUnlockBanner)/180);
    ctx.save(); ctx.globalAlpha=alpha;
    fillRR(W/2-210,H_BASE/2-40,420,80,12,'rgba(0,0,0,0.72)');
    const bannerCol = stage>=4 ? '#00b894' : stage>=3 ? '#fd79a8' : '#a29bfe';
    ctx.strokeStyle=bannerCol; ctx.lineWidth=2;
    ctx.beginPath(); rrPath(W/2-210,H_BASE/2-40,420,80,12); ctx.stroke();
    ctx.shadowBlur=20; ctx.shadowColor=bannerCol;
    ctx.fillStyle=bannerCol; ctx.font='700 15px Nunito'; ctx.textAlign='center';
    ctx.fillText('FLOCK REACHED CRITICAL SIZE!',W/2,H_BASE/2-14);
    ctx.fillStyle='#fff'; ctx.font='28px Bangers';
    const bannerText = stage>=4 ? '⚓  HARBOR UNLOCKED  🦈' : stage>=3 ? '🚗  ROAD ZONE UNLOCKED  🚔' : '🏙️  PROMENADE UNLOCKED  🏙️';
    ctx.fillText(bannerText,W/2,H_BASE/2+22);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='700 11px Nunito';
    const bannerSub = stage>=4 ? '+40 seconds · 🦈 beware of sharks!' : stage>=3 ? '+30 seconds · 🚗 watch out for cars!' : '+30 seconds · 🚔 beware of police!';
    ctx.fillText(bannerSub,W/2,H_BASE/2+42);
    ctx.restore(); stageUnlockBanner--;
  }

  // Score multiplier indicator
  if(scoreMultiplier>1){
    const pulse=0.85+Math.sin(frame*0.15)*0.15;
    ctx.save(); ctx.globalAlpha=pulse;
    ctx.shadowBlur=12; ctx.shadowColor='#ffd700';
    ctx.fillStyle='#ffd700'; ctx.font='700 13px Nunito'; ctx.textAlign='center';
    ctx.fillText('⭐ 2× CHAOS MULTIPLIER — '+Math.ceil(multiplierTimer/60)+'s remaining',W/2,100);
    ctx.restore();
  }

  drawNewsTicker();
}
